<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Submit App</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            background: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #000000;
        }

        .upload-container {
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
        }

        h1 { font-weight: 300; font-size: 32px; margin-bottom: 30px; }

        .form-group { margin-bottom: 20px; position: relative; }

        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        
        label.required:after { content: " *"; color: #e81123; }

        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-family: inherit;
        }

        .char-count {
            font-size: 11px;
            color: #666;
            text-align: right;
            margin-top: 4px;
        }

        textarea { height: 100px; resize: vertical; }

        .switch-group {
            display: block;
            background: #f9f9f9;
            padding: 15px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .switch-label { float: left; line-height: 22px; }

        .switch {
            position: relative;
            display: inline-block;
            width: 45px;
            height: 22px;
            float: right;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .switch input:disabled + .slider {
            background-color: #eee !important;
            cursor: not-allowed;
        }
        .switch input:disabled + .slider:before {
            background-color: #ccc;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            border-radius: 22px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 3px; bottom: 3px;
            background-color: white;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: #0078D7; }
        input:checked + .slider:before { left: 26px; }

        .btn-submit {
            background: #0078D7;
            color: white;
            border: none;
            padding: 12px 30px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }

        .btn-submit:disabled { 
            background: #cccccc; 
            color: #666666;
            cursor: not-allowed; 
        }

        .btn-host {
            background: #f3f3f3;
            color: #333;
            border: 1px solid #ccc;
            padding: 12px 30px;
            font-weight: 400;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            text-align: center;
            text-decoration: none;
            display: block;
            box-sizing: border-box;
            font-size: 14px;
        }
        .btn-host:hover { background: #e5e5e5; }
        .btn-host b { color: #0078D7; }
        
        #status { text-align: center; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="upload-container">
        <h1>Submit your App</h1>
        
        <div class="form-group">
            <label class="required">App Name (Max 30)</label>
            <input type="text" id="appName" maxlength="30">
            <div id="nameCount" class="char-count">0 / 30</div>
        </div>

        <div class="form-group">
            <label class="required">Publisher Name (Max 30)</label>
            <input type="text" id="appPub" maxlength="30">
            <div id="pubCount" class="char-count">0 / 30</div>
        </div>

        <div class="form-group">
            <label class="required">Version (Format: 0.0.0.0)</label>
            <input type="text" id="appVer" placeholder="1.0.0.0">
        </div>

        <div class="form-group">
            <label class="required">Icon URL (.png, .ico, .bmp, .jpg, .jpeg)</label>
            <input type="text" id="appIcon" placeholder="https://example.com/icon.png">
        </div>

        <div class="form-group">
            <label class="required">Package URL (.appx, .appxbundle)</label>
            <input type="text" id="appPkg" placeholder="https://example.com/app.appx">
        </div>

        <div class="form-group">
            <label>Description (Max 300 - Optional)</label>
            <textarea id="appDesc" maxlength="300"></textarea>
            <div id="descCount" class="char-count">0 / 300</div>
        </div>

        <div class="switch-group">
            <span class="switch-label">PC Compatible</span>
            <label class="switch">
                <input type="checkbox" id="pcCapable" checked="checked">
                <span class="slider"></span>
            </label>
        </div>

        <div class="switch-group">
            <span id="mobileLabel" class="switch-label">Mobile Compatible</span>
            <label class="switch">
                <input type="checkbox" id="mobileCapable" checked="checked">
                <span class="slider"></span>
            </label>
        </div>

        <button class="btn-submit" id="submitBtn" disabled>Submit App</button>
        
        <a href="https://8storeupload.dankassassin368.com" target="_blank" class="btn-host">
            Need to host your app? <b>Click here</b>
        </a>

        <a href="https://imgbb.com" target="_blank" class="btn-host">
            Need to host your icon? <b>Click here</b>
        </a>

        <div id="status"></div>
    </div>

    <script type="text/javascript">
(function () {
    // --- CONFIGURATION ---
    const FILE_PATH = "apppending.xml"; // Target file
    
    const webhookNotify = "https://discordapp.com/api/webhooks/1462190316583915562/q6gNtrlwUyDBSUOhLSRolD9AKsDxUsIW9kElsd0qUjwzOcGtGw25yYpbXdf9LZ6uOTqa";

    // ... (Your existing DOM element variables here) ...

    // Generates an ID from the name: "My App v1" -> "my-app-v1"
    function generateIdFromName(name) {
        return name.toLowerCase()
            .replace(/[^a-z0-9]/g, '-') // Replace non-alphanumeric with hyphens
            .replace(/-+/g, '-')       // Remove duplicate hyphens
            .replace(/^-|-$/g, '');    // Trim hyphens from ends
    }

    async function commitToGithub(name, xmlSnippet) {
        const apiUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
        const appId = generateIdFromName(name);
        
        try {
            const response = await fetch(apiUrl, {
                headers: { "Authorization": `token ${GITHUB_TOKEN}` }
            });
            
            if (!response.ok) throw new Error("Could not find apppending.xml");
            
            const fileData = await response.json();
            let currentContent = decodeURIComponent(escape(atob(fileData.content)));
            
            // Logic to Replace or Add
            const appRegex = new RegExp(`<app id="${appId}">[\\s\\S]*?<\\/app>`, 'g');
            
            let updatedContent;
            if (appRegex.test(currentContent)) {
                // REPLACE: If ID exists, swap the old block with the new one
                updatedContent = currentContent.replace(appRegex, xmlSnippet);
            } else {
                // ADD: Insert before the closing </apps> tag
                updatedContent = currentContent.replace('</apps>', `  ${xmlSnippet}\n  </apps>`);
            }
            
            const updateResponse = await fetch(apiUrl, {
                method: "PUT",
                headers: {
                    "Authorization": `token ${GITHUB_TOKEN}`,
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    message: `Update/Add App: ${name}`,
                    content: btoa(unescape(encodeURIComponent(updatedContent))),
                    sha: fileData.sha
                })
            });

            return updateResponse.ok;

        } catch (error) {
            console.error("Github Error:", error);
            return false;
        }
    }

    submitBtn.onclick = async function () {
        submitBtn.disabled = true;
        const nameValue = nameInput.value.trim();
        const appId = generateIdFromName(nameValue);
        
        status.innerText = "Checking file for existing app...";
        
        const xmlSnippet = `<app id="${appId}">
      <name>${nameValue}</name>
      <version>${verInput.value.trim()}</version>
      <icon>${iconInput.value.trim()}</icon>
      <publisher>${pubInput.value.trim()}</publisher>
      <featured>false</featured>
      <description>${descInput.value.trim()}</description>
      <package>${pkgInput.value.trim()}</package>
      <pcCapable>${pcCheck.checked}</pcCapable>
      <mobileCapable>${mobileCheck.checked}</mobileCapable>
    </app>`;

        const success = await commitToGithub(nameValue, xmlSnippet);

        if (success) {
            status.innerText = `Successfully uploaded! (ID: ${appId})`;
            status.style.color = "#107c10";
            
            fetch(webhookNotify, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ content: `📦 **App Updated/Added:** ${nameValue} (ID: ${appId})` })
            });
        } else {
            status.innerText = "Error uploading. Check console.";
            status.style.color = "#e81123";
            submitBtn.disabled = false;
        }
    };
})();
    </script>
</body>
</html>

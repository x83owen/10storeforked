<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Submit App</title>
    <script src="js/config.js"></script>
    <style>
        html, body {
            height: 100%; margin: 0;
            background: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #000000;
        }
        .upload-container { padding: 40px; max-width: 600px; margin: 0 auto; }
        h1 { font-weight: 300; font-size: 32px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        label.required:after { content: " *"; color: #e81123; }
        input[type="text"], textarea, input[type="file"] {
            width: 100%; padding: 10px; border: 1px solid #ccc;
            box-sizing: border-box; font-family: inherit;
        }
        textarea { height: 80px; resize: vertical; }
        .switch-group {
            background: #f9f9f9; padding: 15px; margin-bottom: 10px; overflow: hidden;
        }
        .switch-label { float: left; line-height: 22px; }
        .switch { position: relative; display: inline-block; width: 45px; height: 22px; float: right; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; border-radius: 22px; transition: .4s;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px;
            left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: .4s;
        }
        input:checked + .slider { background-color: #0078D7; }
        input:checked + .slider:before { transform: translateX(24px); }
        .btn-submit {
            background: #0078D7; color: white; border: none; padding: 15px;
            font-weight: 600; cursor: pointer; width: 100%; margin-top: 20px;
        }
        .btn-submit:disabled { background: #cccccc; cursor: not-allowed; }
        #status { text-align: center; margin-top: 15px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="upload-container">
        <h1>Submit App</h1>
        
        <div class="form-group">
            <label class="required">App Name</label>
            <input type="text" id="appName" maxlength="30">
        </div>

        <div class="form-group">
            <label class="required">Publisher</label>
            <input type="text" id="appPub" maxlength="30">
        </div>

        <div class="form-group">
            <label class="required">Version</label>
            <input type="text" id="appVer" placeholder="1.0.0.0">
        </div>

        <div class="form-group">
            <label class="required">Select Icon (.png, .jpg)</label>
            <input type="file" id="iconFile" accept=".png,.jpg,.jpeg,.ico">
        </div>

        <div class="form-group">
            <label class="required">Select Package (.appx, .appxbundle)</label>
            <input type="file" id="pkgFile" accept=".appx,.appxbundle">
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea id="appDesc" maxlength="300"></textarea>
        </div>

        <div class="switch-group">
            <span class="switch-label">PC Compatible</span>
            <label class="switch"><input type="checkbox" id="pcCapable" checked><span class="slider"></span></label>
        </div>

        <div class="switch-group">
            <span class="switch-label">Mobile Compatible</span>
            <label class="switch"><input type="checkbox" id="mobileCapable" checked><span class="slider"></span></label>
        </div>

        <button class="btn-submit" id="submitBtn">Upload & Submit</button>
        <div id="status"></div>
    </div>

    <script>
        (function () {
            const webhookXml = "https://discordapp.com/api/webhooks/1462069210728632422/4Dqjm6BurHkACqxft2AMiKahLvANuumoya85qkFlb7xd68HJjh60OyWMMlSwKIdqumQr";
            const status = document.getElementById("status");
            const submitBtn = document.getElementById("submitBtn");

            function generateID() {
                return Math.random().toString(36).substring(2, 10);
            }

            async function uploadToGithub(file, folder) {
                const fileName = `${Date.now()}_${file.name.replace(/\s+/g, '_')}`;
                const path = `${folder}/${fileName}`;
                const reader = new FileReader();
                
                return new Promise((resolve, reject) => {
                    reader.onload = async () => {
                        const content = reader.result.split(',')[1];
                        const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`;
                        try {
                            const res = await fetch(url, {
                                method: "PUT",
                                headers: { "Authorization": `token ${GITHUB_TOKEN.trim()}`, "Content-Type": "application/json" },
                                body: JSON.stringify({ message: `Upload ${file.name}`, content: content })
                            });
                            if (!res.ok) throw new Error("File upload failed");
                            resolve(`https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/main/${path}`);
                        } catch (e) { reject(e); }
                    };
                    reader.readAsDataURL(file);
                });
            }

            async function updateXml(newAppSnippet) {
                const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/apps.xml`;
                const res = await fetch(url, { headers: { "Authorization": `token ${GITHUB_TOKEN.trim()}` } });
                const data = await res.json();
                let xmlText = decodeURIComponent(escape(atob(data.content.replace(/\s/g, ''))));

                if (xmlText.includes("</store>")) xmlText = xmlText.replace("</store>", `${newAppSnippet}\n</store>`);
                else if (xmlText.includes("</apps>")) xmlText = xmlText.replace("</apps>", `${newAppSnippet}\n</apps>`);

                const updateRes = await fetch(url, {
                    method: "PUT",
                    headers: { "Authorization": `token ${GITHUB_TOKEN.trim()}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: "Add new app to apps.xml",
                        content: btoa(unescape(encodeURIComponent(xmlText))),
                        sha: data.sha
                    })
                });
                return updateRes.ok;
            }

            function sendToDiscord(snippet, appId) {
                const payload = {
                    content: `🚀 **New Live Submission! App ID: ${appId}**\nAutomatically added to apps.xml:\n\`\`\`xml\n${snippet}\n\`\`\``
                };
                fetch(webhookXml, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
            }

            submitBtn.onclick = async function () {
                const iconFile = document.getElementById("iconFile").files[0];
                const pkgFile = document.getElementById("pkgFile").files[0];
                
                if (!iconFile || !pkgFile) { alert("Please select both files."); return; }

                submitBtn.disabled = true;
                status.innerText = "Uploading files to GitHub...";
                status.style.color = "blue";

                try {
                    const iconUrl = await uploadToGithub(iconFile, "uploads/icons");
                    const pkgUrl = await uploadToGithub(pkgFile, "uploads/packages");

                    status.innerText = "Syncing apps.xml...";
                    const currentID = generateID();
                    const snippet = `    <app id="${currentID}">
      <name>${document.getElementById("appName").value}</name>
      <version>${document.getElementById("appVer").value}</version>
      <icon>${iconUrl}</icon>
      <publisher>${document.getElementById("appPub").value}</publisher>
      <featured>false</featured>
      <description>${document.getElementById("appDesc").value}</description>
      <package>${pkgUrl}</package>
      <pcCapable>${document.getElementById("pcCapable").checked}</pcCapable>
      <mobileCapable>${document.getElementById("mobileCapable").checked}</mobileCapable>
    </app>`;

                    const success = await updateXml(snippet);
                    if (success) {
                        sendToDiscord(snippet, currentID);
                        status.innerText = "Success! App is live and Discord notified.";
                        status.style.color = "green";
                    } else { throw new Error("Sync failed."); }
                } catch (e) {
                    status.innerText = "Error: " + e.message;
                    status.style.color = "red";
                    submitBtn.disabled = false;
                }
            };
        })();
    </script>
</body>
</html>

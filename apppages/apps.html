<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <link id="winjs-theme" href="" rel="stylesheet" />
    <script src="ms-appx-web:///lib/winjs-4.0.1/js/base.js"></script>
    <script src="ms-appx-web:///lib/winjs-4.0.1/js/ui.js"></script>
    <link rel="stylesheet" href="ms-appx-web:///css/cardstyles.css" />
    <style>
        * {
            outline: none !important;
        }

        :root {
            --accent: #0078d7;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .header-bar {
            padding: 24px 20px 10px 20px;
            display: flex;
            align-items: center;
        }

        .page-title {
            font-size: 28px;
            font-weight: 300;
        }

        #scroll-container {
            flex: 1;
            padding: 0 16px 20px 16px;
        }

        .all-apps-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
    </style>
</head>
<body class="win-type-body">
    <div class="header-bar">
        <div class="page-title" id="display-title">All apps</div>
    </div>

    <div id="scroll-container">
        <div id="apps-grid" class="all-apps-grid"></div>
    </div>

    <script src="ms-appx-web:///js/config.js"></script>
    <script src="apps.js"></script>
</body>
</html>

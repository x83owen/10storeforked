<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <style>
        html, body {
            height: 100%;
            margin: 0;
            background: #fff !important;
            font-family: 'Segoe UI', sans-serif;
        }

        .app-hero {
            display: flex;
            padding: 20px;
            align-items: flex-start;
        }

        .app-logo-big {
            width: 180px;
            height: 180px;
            border-radius: 20px;
            object-fit: cover;
            border: 1px solid #eee;
        }

        .app-info-right {
            margin-left: 30px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .app-title {
            font-size: 36px;
            font-weight: bold;
            margin: 0;
        }

        .app-publisher {
            color: #0078D7;
            text-decoration: none;
            display: block;
            margin: 5px 0 5px 0;
        }

        .app-version {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
            display: block;
        }

        .app-description {
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .btn-download {
            background: #0078D7;
            color: white;
            border: none;
            padding: 12px 40px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 4px;
            align-self: flex-start; /* Keeps button from stretching in landscape */
        }

        #dl-container {
            width: 100%;
            max-width: 300px;
            margin-bottom: 20px;
        }

        #progress-text {
            font-size: 12px;
            color: gray;
            margin-top: 4px;
        }

        /* PORTRAIT MODE ADJUSTMENTS */
        @media screen and (orientation: portrait), screen and (max-width: 600px) {
            .app-hero {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .app-logo-big {
                width: 150px;
                height: 150px;
                margin-bottom: 15px;
            }

            .app-info-right {
                margin-left: 0;
                width: 100%;
                align-items: center;
            }

            .app-title {
                font-size: 28px;
                order: 1;
            }

            .app-publisher {
                order: 2;
                margin-bottom: 5px;
            }

            .app-version {
                order: 3;
                margin-bottom: 15px;
            }

            #dl-container {
                order: 4;
                width: 80%;
                margin-bottom: 20px;
                align-items: center;
            }

            .btn-download {
                width: 100%;
                align-self: stretch;
            }

            .app-description {
                order: 5;
                text-align: left;
                padding: 0 15px;
            }
        }
        /* Fixed the missing/misplaced bracket here */

    </style>
</head>
<body>
    <div id="app-content"><div style="padding:40px;">Loading app details...</div></div>
    <script src="../js/app.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10-Store | Live Stats</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --win-blue: #0078D7;
            --bg-color: #F2F2F2;
        }

        body {
            margin: 0; display: flex; justify-content: center; align-items: center;
            height: 100vh; background-color: var(--bg-color);
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
        }

        .container { text-align: center; }

        h1 { font-weight: 300; color: #666; font-size: 1.5rem; margin-bottom: -10px; }

        #app-count {
            display: block; font-size: 12rem; font-weight: 800;
            color: var(--win-blue); line-height: 1;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .bump { transform: scale(1.1); }

        .status-box { margin-top: 20px; font-size: 0.8rem; color: #999; }
        #error-log { color: #E81123; font-size: 0.7rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>LIVE APPS</h1>
        <span id="app-count">...</span>
        <div class="status-box">
            <span id="update-timer">Connecting to GitHub...</span>
        </div>
        <div id="error-log"></div>
    </div>

    <script src="config.js"></script>

    <script>
        const countDisplay = document.getElementById('app-count');
        const errorLog = document.getElementById('error-log');
        let currentCount = -1;

        async function fetchAppCount() {
            // Check if config loaded
            if (typeof GITHUB_TOKEN === 'undefined') {
                showError("Config Error: GITHUB_TOKEN is missing. Check config.js.");
                return;
            }

            const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/apps.xml`;

            try {
                const response = await fetch(url, {
                    headers: { "Authorization": `token ${GITHUB_TOKEN}` }
                });

                if (response.status === 401) throw new Error("401: Invalid GitHub Token");
                if (response.status === 404) throw new Error("404: apps.xml not found");
                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);

                const data = await response.json();
                const xmlString = decodeURIComponent(escape(atob(data.content)));
                
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlString, "text/xml");
                const apps = xmlDoc.getElementsByTagName("app");
                const newCount = apps.length;

                if (newCount !== currentCount) {
                    updateDisplay(newCount);
                }
                
                errorLog.style.display = 'none';
                document.getElementById('update-timer').innerText = "Live Monitoring Active";

            } catch (error) {
                showError(error.message);
            }
        }

        function updateDisplay(count) {
            // Milestone Confetti (100, 150, 200, 250, 300)
            if (currentCount !== -1 && count > currentCount && count % 50 === 0) {
                triggerConfetti();
            }

            countDisplay.innerText = count;
            countDisplay.classList.add('bump');
            setTimeout(() => countDisplay.classList.remove('bump'), 300);
            currentCount = count;
        }

        function showError(msg) {
            console.error(msg);
            errorLog.innerText = msg;
            errorLog.style.display = 'block';
            countDisplay.innerText = "!";
        }

        function triggerConfetti() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#0078D7', '#107C10'] });
        }

        // Refresh every 10 seconds for more "live" feel
        setInterval(fetchAppCount, 10000);
        fetchAppCount();
    </script>
</body>
</html>

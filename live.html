<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10-Store | Live Stats</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --win-blue: #0078D7;
            --bg-color: #F2F2F2;
            --text-color: #333;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
        }

        .container {
            text-align: center;
        }

        h1 {
            font-weight: 300;
            margin-bottom: 0;
            color: #666;
            font-size: 1.5rem;
        }

        #app-count {
            display: block;
            font-size: 12rem;
            font-weight: 800;
            color: var(--win-blue);
            line-height: 1;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* The "Pop" Animation */
        .bump {
            transform: scale(1.2);
        }

        .status {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .dot {
            height: 10px;
            width: 10px;
            background-color: #4CAF50;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>LIVE APP COUNT</h1>
        <span id="app-count">0</span>
        <div class="status">
            <span class="dot"></span> Live Monitoring
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        const countDisplay = document.getElementById('app-count');
        let currentCount = -1;

        // Milestones for confetti
        const milestones = [100, 150, 200, 250, 300];

        async function fetchAppCount() {
            const token = window.GITHUB_TOKEN;
            const owner = window.GITHUB_OWNER;
            const repo = window.GITHUB_REPO;
            const path = "apps.xml";

            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

            try {
                const response = await fetch(url, {
                    headers: { "Authorization": `token ${token}` }
                });

                if (!response.ok) throw new Error("Fetch failed");

                const data = await response.json();
                // Decode Base64 content from GitHub
                const xmlString = decodeURIComponent(escape(atob(data.content)));
                
                // Parse XML and count <app> tags
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlString, "text/xml");
                const apps = xmlDoc.getElementsByTagName("app");
                const newCount = apps.length;

                if (newCount !== currentCount) {
                    updateDisplay(newCount);
                }

            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }

        function updateDisplay(count) {
            // Trigger Milestone Confetti
            if (currentCount !== -1 && milestones.includes(count)) {
                triggerConfetti();
            }

            // Update Text
            countDisplay.innerText = count;

            // Trigger Animation
            countDisplay.classList.add('bump');
            setTimeout(() => {
                countDisplay.classList.remove('bump');
            }, 300);

            currentCount = count;
        }

        function triggerConfetti() {
            const duration = 3 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#0078D7', '#107C10', '#E81123']
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#0078D7', '#107C10', '#E81123']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        // Check every 30 seconds
        setInterval(fetchAppCount, 30000);

        // Initial fetch
        fetchAppCount();
    </script>
</body>
</html>

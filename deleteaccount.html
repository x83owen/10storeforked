<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta charset="utf-8" />
    <title>Delete Account</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 40px; text-align: center; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; }
        button { width: 100%; padding: 10px; background: #d70000; color: white; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Delete Account</h1>
    <p style="color:red">This cannot be undone.</p>
    <div id="status"></div>

    <input type="email" id="dEmail" placeholder="Confirm Email">
    <input type="password" id="dPass" placeholder="Confirm Password">
    <button id="delBtn">DELETE ACCOUNT</button>

<script>
document.getElementById("delBtn").onclick = function() {
    var btn = this;
    var statusDiv = document.getElementById("status");
    var email = document.getElementById("dEmail").value.trim().toLowerCase();
    var password = document.getElementById("dPass").value.trim();

    if (!email || !password) {
        statusDiv.innerText = "Please fill in all fields.";
        return;
    }

    btn.disabled = true;
    statusDiv.innerText = "Connecting to server...";

    var xhr = new XMLHttpRequest();
    // Use the absolute URL to your Netlify function
    xhr.open("POST", "https://10storedraydenyt.netlify.app/.netlify/functions/handle-accounts", true);
    xhr.setRequestHeader("Content-Type", "application/json");

    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
            btn.disabled = false;
            try {
                var resp = JSON.parse(xhr.responseText);
                if (xhr.status === 200) {
                    statusDiv.innerHTML = "<span style='color:green'>Account Deleted. Closing...</span>";
                    
                    // Find redirect_uri in the address bar
                    var urlParams = new RegExp('[?&]redirect_uri=([^&#]*)').exec(window.location.href);
                    var redirectUri = urlParams ? decodeURIComponent(urlParams[1]) : "";

                    if (redirectUri) {
                        // Return to app with the "deleted" flag
                        setTimeout(function() {
                            window.location.href = redirectUri + "#status=deleted";
                        }, 1500);
                    }
                } else {
                    statusDiv.innerText = "Error: " + (resp.error || "Invalid credentials or server error.");
                }
            } catch (e) {
                statusDiv.innerText = "Server Error: Check Netlify Logs.";
            }
        }
    };

    xhr.send(JSON.stringify({
        action: "delete",
        email: email,
        password: password
    }));
};
</script>
</body>
</html>

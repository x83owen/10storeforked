<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta charset="utf-8" />
    <title>Delete Account</title>
    <style>
        html, body {
            height: 100%; margin: 0; background: #ffffff;
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            color: #000000 !important; /* Forces black text */
        }
        .auth-container { padding: 40px; max-width: 400px; margin: 0 auto; }
        h1 { font-weight: 300; font-size: 32px; margin-bottom: 10px; color: #000; }
        p { color: #d13438; font-size: 14px; margin-bottom: 30px; font-weight: 600; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; color: #000; }
        
        input {
            width: 100%; padding: 10px; border: 1px solid #ccc; box-sizing: border-box;
            color: #000 !important; background: #fff !important;
        }
        
        .btn-danger {
            background: #d13438; color: white; border: none; padding: 12px;
            font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px;
        }
        
        /* Grey out style */
        .btn-danger:disabled { background: #ccc !important; cursor: not-allowed; opacity: 0.8; }
        
        #statusMsg { text-align: center; margin-top: 15px; font-size: 14px; font-weight: 600; min-height: 20px; }
        .error-text { color: #d13438; }
        .success-text { color: #107c10; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1 id="authTitle">Delete account</h1>
        <p>This action is permanent and cannot be undone.</p>
        
        <div id="statusMsg"></div>

        <div class="form-group">
            <label>Confirm Full Name</label>
            <input type="text" id="userName" placeholder="Your Name">
        </div>

        <div class="form-group">
            <label>Confirm Email address</label>
            <input type="email" id="userEmail" placeholder="example@outlook.com">
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="userPass">
        </div>

        <button type="button" class="btn-danger" id="delBtn" disabled>Delete permanently</button>
    </div>

<script>
    (function () {
        var nameInput = document.getElementById("userName");
        var emailInput = document.getElementById("userEmail");
        var passInput = document.getElementById("userPass");
        var delBtn = document.getElementById("delBtn");
        var statusEl = document.getElementById("statusMsg");

        // --- GREY OUT LOGIC ---
        function validate() {
            var n = nameInput.value.trim();
            var e = emailInput.value.trim();
            var p = passInput.value.trim();
            delBtn.disabled = !(n && e && p);
        }

        [nameInput, emailInput, passInput].forEach(function(i) { 
            i.oninput = validate; 
        });

        // --- DELETE LOGIC ---
        delBtn.onclick = function() {
            statusEl.className = "";
            statusEl.innerText = "Processing deletion...";
            delBtn.disabled = true;

            var payload = {
                action: "delete",
                email: emailInput.value.trim().toLowerCase(),
                password: passInput.value.trim(),
                name: nameInput.value.trim()
            };

            var xhr = new XMLHttpRequest();
            xhr.open("POST", "https://10storedraydenyt.netlify.app/.netlify/functions/handle-accounts", true);
            xhr.setRequestHeader("Content-Type", "application/json");
            
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    try {
                        var resp = JSON.parse(xhr.responseText);
                        if (xhr.status === 200) {
                            statusEl.className = "success-text";
                            statusEl.innerText = "Account deleted. Redirecting...";
                            
                            var urlParams = location.search.substring(1).split('&');
                            var redirectUri = "";
                            for(var i=0; i < urlParams.length; i++) {
                                if(urlParams[i].indexOf("redirect_uri=") === 0) {
                                    redirectUri = decodeURIComponent(urlParams[i].split('=')[1]);
                                }
                            }

                            if (redirectUri) {
                                setTimeout(function() {
                                    window.location.href = redirectUri + "#status=deleted";
                                }, 1500);
                            }
                        } else {
                            statusEl.className = "error-text";
                            statusEl.innerText = resp.error || "Details do not match our records.";
                            delBtn.disabled = false;
                        }
                    } catch (e) {
                        statusEl.className = "error-text";
                        statusEl.innerText = "Server Error";
                        delBtn.disabled = false;
                    }
                }
            };
            xhr.send(JSON.stringify(payload));
        };
    })();
</script>
</body>
</html>

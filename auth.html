<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta charset="utf-8" />
    <title>Account</title>
    <style>
        html, body {
            height: 100%; margin: 0; background: #ffffff;
            font-family: 'Segoe UI', Tahoma, sans-serif; color: #000;
        }
        .auth-container { padding: 40px; max-width: 400px; margin: 0 auto; }
        h1 { font-weight: 300; font-size: 32px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        input[type="email"], input[type="password"] {
            width: 100%; padding: 10px; border: 1px solid #ccc; box-sizing: border-box;
        }
        .btn-primary {
            background: #0078D7; color: white; border: none; padding: 12px;
            font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px;
        }
        .btn-secondary {
            background: #f3f3f3; color: #333; border: 1px solid #ccc; padding: 10px;
            cursor: pointer; width: 100%; margin-top: 10px; font-size: 13px;
        }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
        
        /* Error log styling */
        #statusMsg { text-align: center; margin-top: 15px; font-size: 14px; font-weight: 600; min-height: 20px; }
        .error-text { color: red; }
        .success-text { color: #107c10; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1 id="authTitle">Sign in</h1>
        <div id="statusMsg"></div>

        <div class="form-group" id="nameGroup" style="display:none;">
            <label>Display Name</label>
            <input type="text" id="userName" placeholder="Your Name">
        </div>

        <div class="form-group">
            <label>Email address</label>
            <input type="email" id="userEmail" placeholder="example@outlook.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="userPass">
        </div>

        <div class="form-group" id="photoGroup" style="display:none;">
            <label>Profile Photo</label>
            <input type="file" id="userPhoto" accept="image/*">
        </div>

        <button type="button" class="btn-primary" id="mainBtn">Sign in</button>
        <button type="button" class="btn-secondary" id="toggleBtn">Create new account</button>
    </div>

<script>
    (function () {
        var mode = "signin"; 
        var photoBase64 = "";

        // UI Elements
        var nameGroup = document.getElementById("nameGroup");
        var photoGroup = document.getElementById("photoGroup");
        var fileInput = document.getElementById("userPhoto");
        var toggleBtn = document.getElementById("toggleBtn");
        var mainBtn = document.getElementById("mainBtn");
        var statusEl = document.getElementById("statusMsg");

        // Convert Image to Base64
        fileInput.onchange = function() {
            var file = fileInput.files[0];
            if (file) {
                var reader = new FileReader();
                reader.onload = function(e) { photoBase64 = e.target.result; };
                reader.readAsDataURL(file);
            }
        };

        toggleBtn.onclick = function() {
            mode = (mode === "signin") ? "signup" : "signin";
            document.getElementById("authTitle").innerText = (mode === "signin") ? "Sign in" : "Create account";
            mainBtn.innerText = (mode === "signin") ? "Sign in" : "Register";
            toggleBtn.innerText = (mode === "signin") ? "Create new account" : "Back to Sign in";
            
            // Show/Hide extra fields
            nameGroup.style.display = (mode === "signup") ? "block" : "none";
            photoGroup.style.display = (mode === "signup") ? "block" : "none";
        };

        mainBtn.onclick = function() {
            statusEl.innerText = "Processing...";
            mainBtn.disabled = true;

            var payload = {
                action: mode,
                email: document.getElementById("userEmail").value.trim().toLowerCase(),
                password: document.getElementById("userPass").value.trim(),
                name: document.getElementById("userName").value.trim(),
                photo: photoBase64
            };

            var xhr = new XMLHttpRequest();
            xhr.open("POST", "/.netlify/functions/handle-accounts", true);
            xhr.setRequestHeader("Content-Type", "application/json");
            
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    mainBtn.disabled = false;
                    if (xhr.status === 200) {
                        statusEl.innerText = "Success!";
                        var resp = JSON.parse(xhr.responseText);
                        
                        // Parse URL params for redirect_uri
                        var urlParams = location.search.substring(1).split('&');
                        var redirectUri = "";
                        for(var i=0; i < urlParams.length; i++) {
                            if(urlParams[i].indexOf("redirect_uri=") === 0) {
                                redirectUri = decodeURIComponent(urlParams[i].split('=')[1]);
                            }
                        }

                        if (redirectUri) {
                            // Pass back email, name, and photo (encode carefully!)
                            var resultStr = "#email=" + encodeURIComponent(payload.email) + 
                                            "&name=" + encodeURIComponent(resp.name || payload.name) + 
                                            "&photo=" + encodeURIComponent(resp.photo || photoBase64);
                            
                            window.location.href = redirectUri + resultStr;
                        }
                    } else {
                        statusEl.innerText = "Error";
                    }
                }
            };
            xhr.send(JSON.stringify(payload));
        };
    })();
</script>
</body>
</html>

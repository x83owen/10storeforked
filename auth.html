<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta charset="utf-8" />
    <title>Account</title>
    <style>
        html, body {
            height: 100%; margin: 0; background: #ffffff;
            font-family: 'Segoe UI', Tahoma, sans-serif; color: #000;
        }
        .auth-container { padding: 40px; max-width: 400px; margin: 0 auto; }
        h1 { font-weight: 300; font-size: 32px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        input[type="email"], input[type="password"] {
            width: 100%; padding: 10px; border: 1px solid #ccc; box-sizing: border-box;
        }
        .btn-primary {
            background: #0078D7; color: white; border: none; padding: 12px;
            font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px;
        }
        .btn-secondary {
            background: #f3f3f3; color: #333; border: 1px solid #ccc; padding: 10px;
            cursor: pointer; width: 100%; margin-top: 10px; font-size: 13px;
        }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
        
        /* Error log styling */
        #statusMsg { text-align: center; margin-top: 15px; font-size: 14px; font-weight: 600; min-height: 20px; }
        .error-text { color: red; }
        .success-text { color: #107c10; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1 id="authTitle">Sign in</h1>
        
        <div id="statusMsg"></div>

        <div class="form-group">
            <label>Email address</label>
            <input type="email" id="userEmail" placeholder="example@outlook.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="userPass">
        </div>

        <button type="button" class="btn-primary" id="mainBtn">Sign in</button>
        <button type="button" class="btn-secondary" id="toggleBtn">Create new account</button>
    </div>

<script>
    // 1. GLOBAL ERROR HANDLER (Catches syntax errors in WAB)
    window.onerror = function(msg, url, line) {
        var el = document.getElementById("statusMsg");
        if (el) el.innerHTML = "<span class='error-text'>Error: " + msg + " (Line " + line + ")</span>";
        return false;
    };

    (function () {
        "use strict";

        // IE11 Helper to get URL parameters
        function getQueryParam(name) {
            name = name.replace(/[\[]/, "\\[").replace(/[\]]/, "\\]");
            var regex = new RegExp("[\\?&]" + name + "=([^&#]*)");
            var results = regex.exec(location.search);
            return results === null ? "" : decodeURIComponent(results[1].replace(/\+/g, " "));
        }

        // Variables
        var mode = "signin"; 
        var endpoint = "/.netlify/functions/handle-accounts";
        
        var mainBtn = document.getElementById("mainBtn");
        var toggleBtn = document.getElementById("toggleBtn");
        var titleLabel = document.getElementById("authTitle");
        var statusEl = document.getElementById("statusMsg"); // Renamed to avoid 'window.status' conflict
        
        var emailInput = document.getElementById("userEmail");
        var passInput = document.getElementById("userPass");

        // UI Toggle Logic
        toggleBtn.onclick = function() {
            if (mode === "signin") {
                mode = "signup";
                titleLabel.innerText = "Create account";
                mainBtn.innerText = "Register";
                toggleBtn.innerText = "Back to Sign in";
            } else {
                mode = "signin";
                titleLabel.innerText = "Sign in";
                mainBtn.innerText = "Sign in";
                toggleBtn.innerText = "Create new account";
            }
        };

        // Main Action Logic
        mainBtn.onclick = function() {
            // Clear previous errors
            statusEl.innerHTML = "Connecting...";
            statusEl.className = ""; 
            
            mainBtn.disabled = true;

            var payload = {
                action: mode,
                email: emailInput.value.trim().toLowerCase(),
                password: passInput.value.trim()
            };

            // Basic Validation
            if (!payload.email || !payload.password) {
                statusEl.innerHTML = "<span class='error-text'>Please enter email and password</span>";
                mainBtn.disabled = false;
                return;
            }

            try {
                var xhr = new XMLHttpRequest();
                xhr.open("POST", endpoint, true);
                xhr.setRequestHeader("Content-Type", "application/json");
                
                xhr.onreadystatechange = function () {
                    if (xhr.readyState === 4) {
                        mainBtn.disabled = false;
                        
                        var resp = {};
                        try {
                            resp = JSON.parse(xhr.responseText);
                        } catch(e) {
                            resp = { error: "Server response error" };
                        }

                        if (xhr.status === 200) {
                            statusEl.innerHTML = "<span class='success-text'>Success! Redirecting...</span>";
                            
                            // --- REDIRECT LOGIC ---
                            var callbackUri = getQueryParam('redirect_uri');
                            
                            if (callbackUri && callbackUri !== "") {
                                // Redirect to Windows app
                                window.location.href = callbackUri + "#email=" + encodeURIComponent(payload.email);
                            } else {
                                // Browser fallback
                                try {
                                    localStorage.setItem("user_session", payload.email);
                                } catch(e) {} // LocalStorage might be blocked in WAB
                                
                                setTimeout(function() { 
                                    window.location.href = "home.html"; 
                                }, 1000);
                            }
                        } else {
                            statusEl.innerHTML = "<span class='error-text'>" + (resp.error || "Request Failed") + "</span>";
                        }
                    }
                };
                
                xhr.send(JSON.stringify(payload));
                
            } catch (err) {
                statusEl.innerHTML = "<span class='error-text'>Network Error: " + err.message + "</span>";
                mainBtn.disabled = false;
            }
        };
    })();
</script>
</body>
</html>

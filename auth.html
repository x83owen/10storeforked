<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta charset="utf-8">
    <title>Sign in to your account</title>
    <style>
        body {
            background-color: #f2f2f2;
            background: linear-gradient(135deg, #f0f0f0 0%, #e6e6e6 100%);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }

        /* IE11 Flexbox Fix: Vertical centering needs a wrapper */
        .page-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
        }

        /* IE11 Absolute Center fallback if Flex fails */
        .login-box {
            background-color: #ffffff;
            width: 440px;
            padding: 44px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            box-sizing: border-box;
            position: relative;
        }

        .logo {
            margin-bottom: 24px;
            height: 24px; /* Fixed height for MS style alignment */
        }

        .logo img {
            height: 100%;
            width: auto;
            display: block;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 16px 0;
            color: #1b1b1b;
        }

        .input-group {
            margin-bottom: 16px;
        }

        input {
            width: 100%;
            padding: 6px 10px;
            height: 36px;
            border: 1px solid #8b8b8b;
            border-top: none;
            border-left: none;
            border-right: none;
            border-bottom: 1px solid #666; /* Underline style */
            box-sizing: border-box;
            font-size: 15px;
            color: #1b1b1b;
            outline: none;
            transition: border-bottom-color 0.2s;
        }

        input:focus {
            border-bottom: 2px solid #0067b8;
        }

        .btn-primary {
            background-color: #0067b8;
            color: #ffffff;
            border: none;
            min-width: 108px;
            height: 32px;
            font-size: 15px;
            float: right;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn-primary:hover {
            background-color: #005da6;
        }

        .links {
            margin-top: 20px;
            font-size: 13px;
        }

        .links a {
            color: #0067b8;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .error-text {
            color: #e81123;
            font-size: 14px;
            margin-bottom: 12px;
            display: none;
        }

        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }

        .pfp-preview {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #eee;
            background-size: cover;
            background-position: center;
            margin-bottom: 12px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="login-box clearfix">
            <div class="logo">
                <img src="https://i.ibb.co/ZzzPStbZ/b1321-windows-store-e1534485998985.png" alt="Microsoft">
            </div>

            <div id="pfp-display" class="pfp-preview"></div>
            <h1 id="header-text">Sign in</h1>
            
            <div id="error-box" class="error-text"></div>

            <form id="auth-form">
                <div class="input-group">
                    <input type="email" id="email" placeholder="Email, phone, or Skype" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>

                <div id="reg-fields" style="display:none;">
                    <div class="input-group">
                        <input type="text" id="username" placeholder="Username">
                    </div>
                    <div class="input-group">
                        <input type="text" id="photo" placeholder="Profile Picture URL">
                    </div>
                </div>

                <div class="links">
                    <span id="switch-text">No account? </span>
                    <a id="toggle-btn">Create one!</a>
                </div>

                <div class="clearfix">
                    <button type="submit" id="btn-submit" class="btn-primary">Next</button>
                </div>
            </form>
        </div>
    </div>

<script src="config.js"></script>

<script>
    (function() {
        "use strict";

        var ACCOUNTS_FILE = "accounts.xml";
        var isRegistering = false;
        
        // --- NEW: Capture the callback URL sent by the App ---
        var urlParams = new URLSearchParams(window.location.search);
        var callbackUri = urlParams.get('redirect_uri');

        var emailInput = document.getElementById('email');
        var passInput = document.getElementById('password');
        var userInput = document.getElementById('username');
        var photoInput = document.getElementById('photo');
        var submitBtn = document.getElementById('btn-submit');
        var errorBox = document.getElementById('error-box');
        var regFields = document.getElementById('reg-fields');
        var headerText = document.getElementById('header-text');
        var toggleBtn = document.getElementById('toggle-btn');
        var switchText = document.getElementById('switch-text');
        var pfpDisplay = document.getElementById('pfp-display');

        toggleBtn.onclick = function() {
            isRegistering = !isRegistering;
            if (isRegistering) {
                headerText.innerText = "Create account";
                switchText.innerText = "Has account? ";
                toggleBtn.innerText = "Sign in";
                submitBtn.innerText = "Register";
                regFields.style.display = "block";
            } else {
                headerText.innerText = "Sign in";
                switchText.innerText = "No account? ";
                toggleBtn.innerText = "Create one!";
                submitBtn.innerText = "Next";
                regFields.style.display = "none";
                pfpDisplay.style.display = "none";
            }
            errorBox.style.display = "none";
        };

        photoInput.onchange = function() {
            if (this.value) {
                pfpDisplay.style.backgroundImage = "url('" + this.value + "')";
                pfpDisplay.style.display = "block";
            }
        };

        document.getElementById('auth-form').onsubmit = function(e) {
            e.preventDefault();
            setLoading(true);
            
            var emailVal = emailInput.value;
            var passVal = passInput.value;
            var timestamp = new Date().getTime();

            xhrRequest("GET", "https://api.github.com/repos/" + GITHUB_OWNER + "/" + GITHUB_REPO + "/contents/" + ACCOUNTS_FILE + "?t=" + timestamp, null, function(status, response) {
                if (status === 404 && isRegistering) {
                    handleAuth("<accounts></accounts>", null, emailVal, passVal);
                } else if (status === 200) {
                    var data = JSON.parse(response);
                    var content = decodeURIComponent(escape(window.atob(data.content)));
                    handleAuth(content, data.sha, emailVal, passVal);
                } else {
                    showError("Could not connect to service.");
                    setLoading(false);
                }
            });
        };

        function handleAuth(xmlString, sha, email, password) {
            var parser = new DOMParser();
            var xmlDoc = parser.parseFromString(xmlString, "text/xml");
            var users = xmlDoc.getElementsByTagName("user");
            var foundUser = null;

            for (var i = 0; i < users.length; i++) {
                if (users[i].getElementsByTagName("email")[0].textContent === email) {
                    foundUser = users[i];
                    break;
                }
            }

            if (isRegistering) {
                if (foundUser) {
                    showError("Account already exists.");
                    setLoading(false);
                } else {
                    var newUser = xmlDoc.createElement("user");
                    var eNode = xmlDoc.createElement("email"); eNode.textContent = email;
                    var pNode = xmlDoc.createElement("password"); pNode.textContent = password;
                    var nNode = xmlDoc.createElement("name"); nNode.textContent = userInput.value || "User";
                    var phNode = xmlDoc.createElement("photo"); phNode.textContent = photoInput.value || "";
                    
                    newUser.appendChild(eNode);
                    newUser.appendChild(pNode);
                    newUser.appendChild(nNode);
                    newUser.appendChild(phNode);
                    
                    var root = xmlDoc.getElementsByTagName("accounts")[0] || xmlDoc.appendChild(xmlDoc.createElement("accounts"));
                    root.appendChild(newUser);
                    
                    saveToGitHub(xmlDoc, sha, function(ok) {
                        if (ok) performRedirect(email, userInput.value, photoInput.value);
                        else showError("Save failed.");
                    });
                }
            } else {
                if (foundUser && foundUser.getElementsByTagName("password")[0].textContent === password) {
                    performRedirect(email, foundUser.getElementsByTagName("name")[0].textContent, foundUser.getElementsByTagName("photo")[0].textContent);
                } else {
                    showError("Invalid email or password.");
                    setLoading(false);
                }
            }
        }

        function saveToGitHub(xmlDoc, sha, callback) {
            var serializer = new XMLSerializer();
            var b64 = window.btoa(unescape(encodeURIComponent(serializer.serializeToString(xmlDoc))));
            var body = { message: "Update", content: b64, sha: sha };
            xhrRequest("PUT", "https://api.github.com/repos/" + GITHUB_OWNER + "/" + GITHUB_REPO + "/contents/" + ACCOUNTS_FILE, body, function(s) {
                callback(s === 200 || s === 201);
            });
        }

        function xhrRequest(method, url, data, callback) {
            var xhr = new XMLHttpRequest();
            xhr.open(method, url, true);
            xhr.setRequestHeader("Authorization", "token " + GITHUB_TOKEN);
            if (data) xhr.setRequestHeader("Content-Type", "application/json");
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) callback(xhr.status, xhr.responseText);
            };
            xhr.send(data ? JSON.stringify(data) : null);
        }

        // --- UPDATED: Talk back to the Windows App ---
        function performRedirect(e, n, p) {
            var finalParams = "email=" + encodeURIComponent(e) + "&name=" + encodeURIComponent(n) + "&photo=" + encodeURIComponent(p);
            
            if (callbackUri) {
                // If the app provided a redirect_uri, go there. 
                // This triggers 'success' in the App's WebAuthenticationBroker.
                var separator = callbackUri.indexOf('?') > -1 ? '&' : '?';
                window.location.href = callbackUri + separator + finalParams;
            } else {
                // Fallback for testing in a normal browser
                window.location.href = "index.html?" + finalParams;
            }
        }

        function showError(m) {
            errorBox.innerText = m;
            errorBox.style.display = "block";
            setLoading(false);
        }

        function setLoading(l) {
            submitBtn.disabled = l;
            submitBtn.innerText = l ? "..." : (isRegistering ? "Register" : "Next");
        }
    })();
</script>
</body>
</html>

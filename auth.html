<!DOCTYPE html>
<html>
<head>
    <title>Auth</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: transparent; color: white; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 8px; background: rgba(255,255,255,0.1); border: 1px solid white; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 10px; margin-top: 10px; border: none; font-weight: bold; cursor: pointer; }
        button:disabled { background: #555 !important; cursor: not-allowed; opacity: 0.5; }
        .btn-primary { background: #0078d7; color: white; }
    </style>
</head>
<body>
    <h2 id="title">Sign In</h2>
    <div id="status"></div>
    <div class="form-group" id="nameBox" style="display:none">
        <input type="text" id="name" placeholder="Display Name">
    </div>
    <div class="form-group">
        <input type="email" id="email" placeholder="Email">
    </div>
    <div class="form-group">
        <input type="password" id="pass" placeholder="Password">
    </div>
    <button id="mainBtn" class="btn-primary" disabled>Sign In</button>
    <button id="toggleBtn" style="background:transparent; color:white; text-decoration:underline; font-size:12px">Create Account</button>

    <script>
        var mode = "signin";
        var inputs = [document.getElementById('email'), document.getElementById('pass'), document.getElementById('name')];
        var mainBtn = document.getElementById('mainBtn');

        function validate() {
            var emailVal = inputs[0].value.trim();
            var passVal = inputs[1].value.trim();
            var nameVal = inputs[2].value.trim();
            if (mode === "signin") {
                mainBtn.disabled = !(emailVal && passVal);
            } else {
                mainBtn.disabled = !(emailVal && passVal && nameVal);
            }
        }

        inputs.forEach(function(i) { i.oninput = validate; });

        document.getElementById('toggleBtn').onclick = function() {
            mode = (mode === "signin") ? "signup" : "signin";
            document.getElementById('title').innerText = (mode === "signin") ? "Sign In" : "Register";
            document.getElementById('nameBox').style.display = (mode === "signin") ? "none" : "block";
            this.innerText = (mode === "signin") ? "Create Account" : "Back to Login";
            validate();
        };

        mainBtn.onclick = function() {
            this.disabled = true;
            var payload = { action: mode, email: inputs[0].value, password: inputs[1].value, name: inputs[2].value };
            var xhr = new XMLHttpRequest();
            xhr.open("POST", "/.netlify/functions/handle-accounts");
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        var resp = JSON.parse(xhr.responseText);
                        var redirect = new RegExp('[?&]redirect_uri=([^&#]*)').exec(window.location.href);
                        if (redirect) window.location.href = decodeURIComponent(redirect[1]) + "#email=" + payload.email + "&name=" + (resp.name || payload.name);
                    } else {
                        document.getElementById('status').innerText = "Error processing request.";
                        mainBtn.disabled = false;
                    }
                }
            };
            xhr.send(JSON.stringify(payload));
        };
    </script>
</body>
</html>

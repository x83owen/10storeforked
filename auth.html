<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta charset="utf-8" />
    <title>Account</title>
    <style>
        html, body { height: 100%; margin: 0; background: #ffffff; font-family: 'Segoe UI', sans-serif; color: #000; }
        .auth-container { padding: 40px; max-width: 400px; margin: 0 auto; }
        h1 { font-weight: 300; font-size: 32px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn-primary { background: #0078D7; color: white; border: none; padding: 12px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-secondary { background: #f3f3f3; color: #333; border: 1px solid #ccc; padding: 10px; cursor: pointer; width: 100%; margin-top: 10px; font-size: 13px; }
        #statusMsg { text-align: center; margin-top: 15px; font-size: 14px; font-weight: 600; min-height: 20px; }
        .error-text { color: red; }
        .success-text { color: #107c10; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1 id="authTitle">Sign in</h1>
        <div id="statusMsg"></div>

        <div class="form-group" id="nameGroup" style="display:none;">
            <label>Display Name</label>
            <input type="text" id="userName">
        </div>
        <div class="form-group">
            <label>Email address</label>
            <input type="email" id="userEmail">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="userPass">
        </div>

        <button type="button" class="btn-primary" id="mainBtn">Sign in</button>
        <button type="button" class="btn-secondary" id="toggleBtn">Create new account</button>
    </div>

<script>
    (function () {
        var mode = "signin"; 
        var GITHUB_TOKEN = "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";
        var GITHUB_OWNER = "draydenthemiiyt-maker";
        var GITHUB_REPO = "10-Store";
        var FILE_PATH = "accounts.xml";
        var API_URL = "https://api.github.com/repos/" + GITHUB_OWNER + "/" + GITHUB_REPO + "/contents/" + FILE_PATH;

        var nameInput = document.getElementById("userName"),
            emailInput = document.getElementById("userEmail"),
            passInput = document.getElementById("userPass"),
            mainBtn = document.getElementById("mainBtn"),
            statusEl = document.getElementById("statusMsg");

        document.getElementById("toggleBtn").onclick = function() {
            mode = (mode === "signin") ? "signup" : "signin";
            document.getElementById("authTitle").innerText = (mode === "signin") ? "Sign in" : "Create account";
            mainBtn.innerText = (mode === "signin") ? "Sign in" : "Register";
            document.getElementById("nameGroup").style.display = (mode === "signup") ? "block" : "none";
        };

        mainBtn.onclick = function() {
            var email = emailInput.value.replace(/\s/g, '').toLowerCase();
            var password = passInput.value.trim();
            var name = nameInput.value.trim();

            if (!email || !password || (mode === "signup" && !name)) {
                showError("Fill in all boxes.");
                return;
            }

            statusEl.className = "";
            statusEl.innerText = "Connecting...";
            mainBtn.disabled = true;

            try {
                var xhr = new XMLHttpRequest();
                // Adding a timestamp to the URL to prevent IE11 caching
                xhr.open("GET", API_URL + "?t=" + new Date().getTime(), true);
                xhr.setRequestHeader("Authorization", "token " + GITHUB_TOKEN.trim());
                xhr.setRequestHeader("Accept", "application/vnd.github.v3+json");
                
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200) {
                            var data = JSON.parse(xhr.responseText);
                            processData(data, email, password, name);
                        } else {
                            showError("Connection Failed (Status: " + xhr.status + ")");
                        }
                    }
                };
                
                xhr.onerror = function() { showError("Network error. Check connection."); };
                xhr.send();
            } catch (e) {
                showError("System error: " + e.message);
            }
        };

        function processData(data, email, password, name) {
            try {
                var sha = data.sha;
                // IE11 needs this specific way to handle base64
                var xmlText = decodeURIComponent(escape(window.atob(data.content.replace(/\s/g, ''))));
                var parser = new DOMParser();
                var xmlDoc = parser.parseFromString(xmlText, "text/xml");
                var users = xmlDoc.getElementsByTagName("user");
                var existingUser = null;

                for (var i = 0; i < users.length; i++) {
                    var emailNode = users[i].getElementsByTagName("email")[0];
                    if (emailNode && emailNode.textContent.toLowerCase() === email) {
                        existingUser = users[i];
                        break;
                    }
                }

                if (mode === "signin") {
                    if (existingUser && existingUser.getElementsByTagName("password")[0].textContent === password) {
                        handleSuccess(email, existingUser.getElementsByTagName("name")[0].textContent);
                    } else {
                        showError("Wrong email or password.");
                    }
                } else {
                    if (existingUser) {
                        showError("Account already exists.");
                        return;
                    }
                    var newUser = xmlDoc.createElement("user");
                    var nN = xmlDoc.createElement("name"); nN.textContent = name;
                    var nE = xmlDoc.createElement("email"); nE.textContent = email;
                    var nP = xmlDoc.createElement("password"); nP.textContent = password;
                    newUser.appendChild(nN); newUser.appendChild(nE); newUser.appendChild(nP);
                    xmlDoc.documentElement.appendChild(newUser);

                    var updatedXml = new XMLSerializer().serializeToString(xmlDoc);

                    var putXhr = new XMLHttpRequest();
                    putXhr.open("PUT", API_URL, true);
                    putXhr.setRequestHeader("Authorization", "token " + GITHUB_TOKEN.trim());
                    putXhr.setRequestHeader("Content-Type", "application/json");
                    putXhr.onreadystatechange = function() {
                        if (putXhr.readyState === 4) {
                            if (putXhr.status === 200 || putXhr.status === 201) {
                                handleSuccess(email, name);
                            } else {
                                showError("Save failed: " + putXhr.status);
                            }
                        }
                    };
                    putXhr.send(JSON.stringify({
                        message: "Register: " + email,
                        content: window.btoa(unescape(encodeURIComponent(updatedXml))),
                        sha: sha
                    }));
                }
            } catch (err) {
                showError("Processing error: " + err.message);
            }
        }

        function handleSuccess(email, name) {
            statusEl.className = "success-text";
            statusEl.innerText = "Success! Redirecting...";
            var url = window.location.href;
            var redirectUri = "";
            if (url.indexOf("redirect_uri=") !== -1) {
                redirectUri = decodeURIComponent(url.split("redirect_uri=")[1].split("&")[0]);
            }
            if (redirectUri) {
                window.location.href = redirectUri + "#email=" + encodeURIComponent(email) + "&name=" + encodeURIComponent(name);
            } else {
                alert("Hello, " + name);
                mainBtn.disabled = false;
            }
        }

        function showError(msg) {
            statusEl.className = "error-text";
            statusEl.innerText = msg;
            mainBtn.disabled = false;
        }
    })();
</script>
</body>
</html>

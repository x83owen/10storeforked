<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10-Store | Account</title>
    <style>
        :root {
            --win-blue: #0078D7;
            --win-gray: #F2F2F2;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--win-gray);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .auth-container {
            background: white;
            width: 340px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            border: 1px solid #e5e5e5;
            text-align: center;
            position: relative;
        }

        h2 { font-weight: 300; margin-bottom: 20px; color: #333; }

        .input-group { margin-bottom: 15px; text-align: left; }
        
        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 2px solid #ccc;
            box-sizing: border-box;
            font-family: 'Segoe UI';
        }

        input:focus { border-color: var(--win-blue); outline: none; }

        button {
            background: var(--win-blue);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        button:disabled { background: #ccc; cursor: default; }

        .toggle-btn {
            background: none;
            color: var(--win-blue);
            margin-top: 15px;
            font-size: 13px;
            text-decoration: underline;
        }

        .toggle-btn:hover { opacity: 0.8; }

        #error-msg {
            color: #E81123;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }

        /* Loading Spinner */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--win-blue);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
            display: none;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Profile Pic Preview */
        .pfp-preview {
            width: 80px; height: 80px; border-radius: 50%;
            background: #ddd; margin: 0 auto 15px;
            background-size: cover; background-position: center;
            display: none;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div id="pfp-display" class="pfp-preview"></div>
        <h2 id="page-title">Sign in</h2>

        <form id="auth-form">
            <div class="input-group">
                <input type="email" id="email" placeholder="Email address" required>
            </div>
            
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <div id="register-fields" style="display:none;">
                <div class="input-group">
                    <input type="text" id="username" placeholder="Display Name">
                </div>
                <div class="input-group">
                    <input type="url" id="photo-url" placeholder="Profile Picture URL (Optional)" onchange="updatePreview()">
                </div>
            </div>

            <button type="submit" id="submit-btn">
                <div class="loader" id="loader"></div> <span id="btn-text">Sign in</span>
            </button>
        </form>

        <p id="error-msg"></p>
        <button type="button" class="toggle-btn" id="toggle-mode">No account? Create one!</button>
    </div>

    <script src="config.js"></script>

    <script>
        const ACCOUNTS_FILE = "accounts.xml";
        let isRegistering = false;
        
        const dom = {
            form: document.getElementById('auth-form'),
            title: document.getElementById('page-title'),
            btn: document.getElementById('submit-btn'),
            btnText: document.getElementById('btn-text'),
            toggle: document.getElementById('toggle-mode'),
            regFields: document.getElementById('register-fields'),
            error: document.getElementById('error-msg'),
            loader: document.getElementById('loader'),
            pfp: document.getElementById('pfp-display')
        };

        // --- TOGGLE MODE ---
        dom.toggle.onclick = () => {
            isRegistering = !isRegistering;
            dom.title.innerText = isRegistering ? "Create Account" : "Sign in";
            dom.btnText.innerText = isRegistering ? "Register" : "Sign in";
            dom.toggle.innerText = isRegistering ? "Already have an account? Sign in" : "No account? Create one!";
            dom.regFields.style.display = isRegistering ? "block" : "none";
            dom.pfp.style.display = isRegistering ? "block" : "none";
            dom.error.style.display = 'none';
        };

        function updatePreview() {
            const url = document.getElementById('photo-url').value;
            if(url) dom.pfp.style.backgroundImage = `url('${url}')`;
        }

        // --- GITHUB HELPERS ---
        async function getGitHubFile(path) {
            const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`;
            const res = await fetch(url, { headers: { "Authorization": `token ${GITHUB_TOKEN}` } });
            if (res.status === 404) return { content: "<accounts></accounts>", sha: null }; // New file
            if (!res.ok) throw new Error("Connection failed");
            const data = await res.json();
            return {
                sha: data.sha,
                content: decodeURIComponent(escape(atob(data.content)))
            };
        }

        async function saveGitHubFile(path, content, sha) {
            const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`;
            const body = {
                message: "User Registration",
                content: btoa(unescape(encodeURIComponent(content))),
                sha: sha
            };
            const res = await fetch(url, {
                method: "PUT",
                headers: { 
                    "Authorization": `token ${GITHUB_TOKEN}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(body)
            });
            if (!res.ok) throw new Error("Failed to save data");
        }

        // --- MAIN LOGIC ---
        dom.form.onsubmit = async (e) => {
            e.preventDefault();
            setLoading(true);
            dom.error.style.display = 'none';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                // 1. Fetch Accounts
                const fileData = await getGitHubFile(ACCOUNTS_FILE);
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(fileData.content, "text/xml");
                const accounts = Array.from(xmlDoc.getElementsByTagName("user"));

                if (isRegistering) {
                    // --- REGISTRATION ---
                    const exists = accounts.find(u => u.getElementsByTagName("email")[0].textContent === email);
                    if (exists) throw new Error("Email already registered");

                    const username = document.getElementById('username').value.trim();
                    const photo = document.getElementById('photo-url').value.trim() || "https://via.placeholder.com/150";

                    // Create new user node
                    const newUser = xmlDoc.createElement("user");
                    newUser.innerHTML = `
                        <email>${email}</email>
                        <password>${password}</password>
                        <name>${username}</name>
                        <photo>${photo}</photo>
                    `;

                    // Handle empty file case
                    let root = xmlDoc.getElementsByTagName("accounts")[0];
                    if (!root) {
                        root = xmlDoc.createElement("accounts");
                        xmlDoc.appendChild(root);
                    }
                    root.appendChild(newUser);

                    // Save to GitHub
                    const serializer = new XMLSerializer();
                    await saveGitHubFile(ACCOUNTS_FILE, serializer.serializeToString(xmlDoc), fileData.sha);
                    
                    finishAuth(email, username, photo);

                } else {
                    // --- LOGIN ---
                    const user = accounts.find(u => 
                        u.getElementsByTagName("email")[0].textContent === email && 
                        u.getElementsByTagName("password")[0].textContent === password
                    );

                    if (!user) throw new Error("Invalid email or password");

                    const name = user.getElementsByTagName("name")[0].textContent;
                    const photo = user.getElementsByTagName("photo")[0].textContent;
                    
                    finishAuth(email, name, photo);
                }

            } catch (err) {
                dom.error.innerText = err.message;
                dom.error.style.display = 'block';
                setLoading(false);
            }
        };

        function finishAuth(email, name, photo) {
            // Get redirect URI from URL params (from your WinJS app)
            const params = new URLSearchParams(window.location.search);
            let redirect = params.get("redirect_uri");

            if (redirect) {
                // Build the success URL with params
                const target = new URL(redirect);
                target.searchParams.set("email", email);
                target.searchParams.set("name", name);
                target.searchParams.set("photo", photo);
                target.searchParams.set("status", "success");
                
                window.location.href = target.toString();
            } else {
                // Fallback if testing in browser
                alert("Login Successful!\nWelcome " + name);
                setLoading(false);
            }
        }

        function setLoading(loading) {
            dom.btn.disabled = loading;
            dom.loader.style.display = loading ? 'inline-block' : 'none';
        }
    </script>
</body>
</html>

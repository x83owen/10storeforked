<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
  
    <link id="winjs-theme" href="ms-appx-web:///winjs/ui-dark.css" rel="stylesheet" />
    <script src="ms-appx-web:///winjs/base.js"></script>
    <script src="ms-appx-web:///winjs/ui.js"></script>
  
<style>
    html, body {
        width: 100%; height: 100%;
        margin: 0; padding: 0;
        overflow: hidden;
        background-color: #111;
    }

    #homeRoot {
        width: 100%; height: 100%;
        display: -ms-flexbox; display: flex;
        -ms-flex-direction: column; flex-direction: column;
    }

    #homeHeader {
        -ms-flex: 0 0 auto; flex: 0 0 auto;
        padding: 16px;
        background-color: rgba(32,32,32,0.85);
    }

    #contentSection {
        -ms-flex: 1 1 auto; flex: 1 1 auto;
        padding: 12px;
        box-sizing: border-box;
    }

    #videoList {
        width: 100%; height: 100%;
    }

    /* --- CLEAN METRO CARD --- */

    .video-card {
        width: 320px;
        background: transparent !important;
        padding: 0;
        margin: 0;
        border: none !important;
    }

    .thumb-wrapper {
        position: relative;
        width: 100%;
        height: 180px;
        overflow: hidden;
        background: transparent;
    }

    .thumb-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border: none;
    }

    .thumb-duration {
        position: absolute;
        right: 6px;
        bottom: 6px;
        padding: 3px 6px;
        background-color: rgba(0,0,0,0.65);
        border-radius: 2px;
        font-size: 12px;
    }

    .video-meta {
        display: -ms-flexbox; display: flex;
        padding: 10px 0;
        background: transparent;
    }

    .channel-avatar {
        width: 40px; height: 40px;
        border-radius: 50%;
        margin-right: 10px;
        object-fit: cover;
        background: transparent;
    }

    .meta-text {
        -ms-flex: 1 1 auto; flex: 1 1 auto;
        min-width: 0;
    }

    .video-title {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 4px;
    }

    .video-channel,
    .video-views {
        font-size: 12px;
        opacity: 0.75;
    }

    /* Remove WinJS default item chrome */
    .win-container {
        background: transparent !important;
        border: none !important;
    }
</style>
</head>

<body class="win-type-body">
<div id="homeRoot" class="win-ui-light">

    <header id="homeHeader" class="win-type-title">Home</header>

    <section id="contentSection">
        <div id="videoList"
             data-win-control="WinJS.UI.ListView"
             data-win-options="{
                selectionMode: 'none',
                tapBehavior: 'invoke',
                layout: { type: WinJS.UI.GridLayout }
             }">
        </div>

        <!-- Template -->
        <div id="videoTemplate" data-win-control="WinJS.Binding.Template" style="display:none">
            <div class="video-card win-item">
                <div class="thumb-wrapper">
                    <img class="thumb-image" data-win-bind="src: thumbnailUrl" />
                    <div class="thumb-duration win-type-caption">
                        <span data-win-bind="textContent: durationFormatted"></span>
                    </div>
                </div>

                <div class="video-meta">
                    <img class="channel-avatar" data-win-bind="src: channelThumbUrl" />
                    <div class="meta-text">
                        <div class="video-title win-type-subtitle"
                             data-win-bind="textContent: title"></div>
                        <div class="video-channel win-type-caption"
                             data-win-bind="textContent: channelTitle"></div>
                        <div class="video-views win-type-caption"
                             data-win-bind="textContent: viewCountFormatted"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>

<script>
(function () {
    "use strict";

    var API_KEY = "AIzaSyD9-Zah-rzZvWvLMNAMCrNwRN-u3kAB2N0";
    var QUERY = "Trending";
    var MAX_RESULTS = 50;

    var listView, bindingList;

    function httpGetJson(url) {
        return new WinJS.Promise(function (complete, error) {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", url, true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        try { complete(JSON.parse(xhr.responseText)); }
                        catch (e) { error(e); }
                    } else {
                        error(new Error("HTTP " + xhr.status));
                    }
                }
            };
            xhr.send();
        });
    }

    function formatViews(n) {
        n = parseInt(n || "0", 10);
        return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",") + " views";
    }

    function parseDuration(iso) {
        var h=0,m=0,s=0;
        var match = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
        if (match) {
            h = parseInt(match[1]||"0",10);
            m = parseInt(match[2]||"0",10);
            s = parseInt(match[3]||"0",10);
        }
        var parts=[];
        if (h>0) {
            parts.push(h);
            parts.push(("0"+m).slice(-2));
        } else {
            parts.push(m);
        }
        parts.push(("0"+s).slice(-2));
        return parts.join(":");
    }

    function buildItems(search, videos, channels) {
        var videoMap={}, channelMap={}, items=[];
        var i;

        if (videos.items) {
            for (i=0;i<videos.items.length;i++) {
                videoMap[videos.items[i].id] = videos.items[i];
            }
        }

        if (channels.items) {
            for (i=0;i<channels.items.length;i++) {
                channelMap[channels.items[i].id] = channels.items[i];
            }
        }

        if (!search.items) return items;

        for (i=0;i<search.items.length;i++) {
            var it = search.items[i];
            if (!it.id || it.id.kind !== "youtube#video") continue;

            var vid = it.id.videoId;
            var sn = it.snippet || {};
            var vinfo = videoMap[vid] || {};
            var stats = vinfo.statistics || {};
            var cd = vinfo.contentDetails || {};

            var chId = sn.channelId;
            var chInfo = channelMap[chId] || {};
            var chSn = chInfo.snippet || {};

            var thumb = sn.thumbnails && (sn.thumbnails.medium || sn.thumbnails.default);
            var chThumb = chSn.thumbnails && (chSn.thumbnails.default || chSn.thumbnails.medium);

            items.push({
                videoId: vid,
                title: sn.title || "",
                channelTitle: sn.channelTitle || "",
                thumbnailUrl: thumb ? thumb.url : "",
                channelThumbUrl: chThumb ? chThumb.url : "",
                viewCountFormatted: formatViews(stats.viewCount),
                durationFormatted: parseDuration(cd.duration || "PT0S")
            });
        }

        return items;
    }

    function loadVideos() {
        var searchUrl =
            "https://www.googleapis.com/youtube/v3/search" +
            "?part=snippet&type=video&maxResults=" + MAX_RESULTS +
            "&q=" + encodeURIComponent(QUERY) +
            "&key=" + API_KEY;

        return httpGetJson(searchUrl).then(function (searchJson) {
            var vids=[], chs={}, i;

            if (searchJson.items) {
                for (i=0;i<searchJson.items.length;i++) {
                    var it = searchJson.items[i];
                    if (it.id && it.id.videoId) vids.push(it.id.videoId);
                    if (it.snippet && it.snippet.channelId) chs[it.snippet.channelId] = true;
                }
            }

            var chList=[];
            for (var c in chs) if (chs.hasOwnProperty(c)) chList.push(c);

            var videosUrl =
                "https://www.googleapis.com/youtube/v3/videos" +
                "?part=contentDetails,statistics&id=" + vids.join(",") +
                "&key=" + API_KEY;

            var channelsUrl =
                "https://www.googleapis.com/youtube/v3/channels" +
                "?part=snippet&id=" + chList.join(",") +
                "&key=" + API_KEY;

            return WinJS.Promise.join({
                search: WinJS.Promise.as(searchJson),
                videos: httpGetJson(videosUrl),
                channels: httpGetJson(channelsUrl)
            });
        }).then(function (res) {
            var items = buildItems(res.search, res.videos, res.channels);
            bindingList = new WinJS.Binding.List(items);
            listView.itemDataSource = bindingList.dataSource;
        });
    }

    function onItemInvoked(e) {
        var item = bindingList.getAt(e.detail.itemIndex);
        if (!item) return;

        window.parent.postMessage({
            type: "openVideo",
            videoId: item.videoId
        }, "*");
    }

    function ready() {
        listView = document.getElementById("videoList").winControl;
        listView.itemTemplate = document.getElementById("videoTemplate");
        listView.addEventListener("iteminvoked", onItemInvoked, false);

        loadVideos();
    }

    WinJS.UI.processAll().done(ready);
})();
</script>

</body>
</html>

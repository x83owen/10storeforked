<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />

    <link id="winjs-theme" href="ms-appx-web:///winjs/ui-dark.css" rel="stylesheet" />
    <script src="ms-appx-web:///winjs/base.js"></script>
    <script src="ms-appx-web:///winjs/ui.js"></script>

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* Windows 8.1 panoramic layout */
        #homeRoot {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        #homeHeader {
            padding: 30px 40px 10px 40px;
        }

        #contentSection {
            flex: 1;
            overflow: hidden;
            padding: 0 40px 40px 40px;
            box-sizing: border-box;
        }

        #videoList {
            width: 100%;
            height: 100%;
        }

        /* WinJS ListView item container – Metro tile sizing */
        .win-container {
            margin: 0 40px 40px 0 !important;
            width: 360px !important;
            background: transparent !important;
            border: none !important;
        }

        @media (max-width: 1400px) {
            .win-container {
                width: 300px !important;
            }
        }

        @media (max-width: 1000px) {
            .win-container {
                width: 260px !important;
            }
        }

        @media (max-width: 700px) {
            .win-container {
                width: 100% !important;
                margin-right: 0 !important;
            }
        }

        /* Tile content – uses WinJS typography classes for look */
        .video-card-content {
            width: 100%;
        }

        /* 16:9 thumbnail using padding trick */
        .thumb-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            overflow: hidden;
        }

        .thumb {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .duration {
            position: absolute;
            right: 8px;
            bottom: 8px;
            padding: 4px 8px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 2px;
        }

        .info {
            display: flex;
            padding-top: 12px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 12px;
        }

        .text {
            flex: 1;
            min-width: 0;
        }

        .title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>

<body class="win-type-body">
<div id="homeRoot" class="win-ui-light">

    <header id="homeHeader" class="win-type-title">Home</header>

    <section id="contentSection">
        <div id="videoList"
             data-win-control="WinJS.UI.ListView"
             data-win-options="{
                selectionMode: 'none',
                tapBehavior: 'invoke',
                layout: { type: WinJS.UI.GridLayout }
             }">
        </div>

        <!-- Windows 8.1-style tile template -->
        <div id="videoTemplate" data-win-control="WinJS.Binding.Template" style="display:none">
            <div class="video-card-content">

                <div class="thumb-wrapper">
                    <img class="thumb" data-win-bind="src: thumbnailUrl" />
                    <div class="duration win-type-caption"
                         data-win-bind="textContent: durationFormatted"></div>
                </div>

                <div class="info">
                    <img class="avatar" data-win-bind="src: channelThumbUrl" />
                    <div class="text">
                        <div class="title win-type-subtitle"
                             data-win-bind="textContent: title"></div>
                        <div class="channel win-type-caption"
                             data-win-bind="textContent: channelTitle"></div>
                        <div class="views win-type-caption"
                             data-win-bind="textContent: viewCountFormatted"></div>
                    </div>
                </div>

            </div>
        </div>
    </section>
</div>

<script>
(function () {
    "use strict";

    var API_KEY = "AIzaSyD9-Zah-rzZvWvLMNAMCrNwRN-u3kAB2N0";
    var QUERY = "Trending";
    var MAX_RESULTS = 50;

    var listView, bindingList;

    function httpGetJson(url) {
        return new WinJS.Promise(function (complete, error) {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", url, true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4) {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        try { complete(JSON.parse(xhr.responseText)); }
                        catch (e) { error(e); }
                    } else {
                        error(new Error("HTTP " + xhr.status));
                    }
                }
            };
            xhr.send();
        });
    }

    function formatViews(n) {
        n = parseInt(n || "0", 10);
        return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",") + " views";
    }

    function parseDuration(iso) {
        var h = 0, m = 0, s = 0;
        var match = iso && iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
        if (match) {
            h = parseInt(match[1] || "0", 10);
            m = parseInt(match[2] || "0", 10);
            s = parseInt(match[3] || "0", 10);
        }
        var parts = [];
        if (h > 0) {
            parts.push(h);
            parts.push(("0" + m).slice(-2));
        } else {
            parts.push(m);
        }
        parts.push(("0" + s).slice(-2));
        return parts.join(":");
    }

    function buildItems(search, videos, channels) {
        var videoMap = {}, channelMap = {}, items = [];
        var i;

        if (videos.items) {
            for (i = 0; i < videos.items.length; i++) {
                videoMap[videos.items[i].id] = videos.items[i];
            }
        }

        if (channels.items) {
            for (i = 0; i < channels.items.length; i++) {
                channelMap[channels.items[i].id] = channels.items[i];
            }
        }

        if (!search.items) {
            return items;
        }

        for (i = 0; i < search.items.length; i++) {
            var it = search.items[i];
            if (!it.id || it.id.kind !== "youtube#video") {
                continue;
            }

            var vid = it.id.videoId;
            var sn = it.snippet || {};
            var vinfo = videoMap[vid] || {};
            var stats = vinfo.statistics || {};
            var cd = vinfo.contentDetails || {};

            var chId = sn.channelId;
            var chInfo = channelMap[chId] || {};
            var chSn = chInfo.snippet || {};

            var thumb = sn.thumbnails && (sn.thumbnails.high || sn.thumbnails.medium || sn.thumbnails.default);
            var chThumb = chSn.thumbnails && (chSn.thumbnails.default || chSn.thumbnails.medium || chSn.thumbnails.high);

            items.push({
                videoId: vid,
                title: sn.title || "",
                channelTitle: sn.channelTitle || "",
                thumbnailUrl: thumb ? thumb.url : "",
                channelThumbUrl: chThumb ? chThumb.url : "",
                viewCountFormatted: formatViews(stats.viewCount),
                durationFormatted: parseDuration(cd.duration || "PT0S")
            });
        }

        return items;
    }

    function loadVideos() {
        var searchUrl =
            "https://www.googleapis.com/youtube/v3/search" +
            "?part=snippet&type=video&maxResults=" + MAX_RESULTS +
            "&q=" + encodeURIComponent(QUERY) +
            "&key=" + API_KEY;

        return httpGetJson(searchUrl).then(function (searchJson) {
            var vids = [], chs = {}, i;

            if (searchJson.items) {
                for (i = 0; i < searchJson.items.length; i++) {
                    var it = searchJson.items[i];
                    if (it.id && it.id.videoId) {
                        vids.push(it.id.videoId);
                    }
                    if (it.snippet && it.snippet.channelId) {
                        chs[it.snippet.channelId] = true;
                    }
                }
            }

            var chList = [];
            for (var c in chs) {
                if (chs.hasOwnProperty(c)) {
                    chList.push(c);
                }
            }

            var videosUrl =
                "https://www.googleapis.com/youtube/v3/videos" +
                "?part=contentDetails,statistics&id=" + vids.join(",") +
                "&key=" + API_KEY;

            var channelsUrl =
                "https://www.googleapis.com/youtube/v3/channels" +
                "?part=snippet&id=" + chList.join(",") +
                "&key=" + API_KEY;

            return WinJS.Promise.join({
                search: WinJS.Promise.as(searchJson),
                videos: httpGetJson(videosUrl),
                channels: httpGetJson(channelsUrl)
            });
        }).then(function (res) {
            var items = buildItems(res.search, res.videos, res.channels);
            bindingList = new WinJS.Binding.List(items);
            listView.itemDataSource = bindingList.dataSource;
        });
    }

    function onItemInvoked(e) {
        var item = bindingList.getAt(e.detail.itemIndex);
        if (!item) {
            return;
        }

        window.parent.postMessage({
            type: "openVideo",
            videoId: item.videoId
        }, "*");
    }

    function ready() {
        listView = document.getElementById("videoList").winControl;
        listView.itemTemplate = document.getElementById("videoTemplate");
        listView.addEventListener("iteminvoked", onItemInvoked, false);

        loadVideos();
    }

    WinJS.UI.processAll().done(ready);
})();
</script>

</body>
</html>

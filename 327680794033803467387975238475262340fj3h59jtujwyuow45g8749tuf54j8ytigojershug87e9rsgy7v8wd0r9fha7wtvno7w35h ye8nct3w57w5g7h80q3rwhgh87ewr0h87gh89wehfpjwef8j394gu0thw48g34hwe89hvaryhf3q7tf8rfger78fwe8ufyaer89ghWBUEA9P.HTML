<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>10-Store | Admin Review</title>
    <style>
        :root {
            --win-blue: #0078D7;
            --win-green: #107C10;
            --win-red: #E81123;
            --win-bg: #F2F2F2;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--win-bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Login Overlay */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .login-box { text-align: center; width: 300px; }
        .user-avatar {
            width: 120px; height: 120px;
            background: #888; border-radius: 50%;
            margin: 0 auto 20px; display: flex;
            align-items: center; justify-content: center;
            font-size: 50px; border: 2px solid white;
        }

        .login-box input {
            width: 100%; padding: 10px;
            border: 2px solid rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.3);
            color: white; box-sizing: border-box;
            outline: none; margin-bottom: 15px;
        }

        .login-box button {
            background: rgba(255,255,255,0.2);
            border: 2px solid white; color: white;
            width: 100%; padding: 10px; cursor: pointer;
            font-weight: bold;
        }

        /* Dashboard UI */
        #main-ui { display: none; flex-direction: column; height: 100%; }
        header { background: var(--win-blue); color: white; padding: 10px 25px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 250px; background: #E6E6E6; padding: 20px; border-right: 1px solid #CCC; }
        .content { flex: 1; padding: 30px; overflow-y: auto; }

        /* App Cards */
        .section-header { font-size: 24px; font-weight: 300; margin: 20px 0; color: #333; border-bottom: 1px solid #CCC; padding-bottom: 10px; }
        .app-card { background: white; border: 1px solid #DDD; padding: 20px; margin-bottom: 20px; display: flex; gap: 20px; align-items: flex-start; }
        .app-icon { width: 80px; height: 80px; object-fit: contain; background: #F9F9F9; border: 1px solid #EEE; }
        .app-info { flex: 1; }
        .app-info h2 { margin: 0; font-size: 20px; font-weight: 400; }
        .details { font-size: 13px; color: #666; margin: 5px 0 15px 0; }
        
        /* Buttons */
        .controls { display: flex; gap: 10px; align-items: center; }
        button.action-btn { padding: 8px 16px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
        .btn-approve { background: var(--win-green); color: white; }
        .btn-decline { background: #CCC; color: black; }
        .btn-unpublish { background: #444; color: white; }
        .btn-unpublish:hover { background: var(--win-red); }
        
        .status-msg { font-size: 13px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <div class="user-avatar">👤</div>
        <h2>Administrator</h2>
        <input type="password" id="pass-input" placeholder="Password" autofocus autocomplete="off">
        <button onclick="checkPass()">Sign in</button>
        <p id="fail-msg" style="color:#ffb3b3; display:none; margin-top:10px;">Access Denied.</p>
    </div>
</div>

<div id="main-ui">
    <header><h1>10-Store App Management</h1></header>
    <div class="main-layout">
        <div class="sidebar">
            <h3>Dashboard</h3>
            <p style="font-size: 12px;">Manage store submissions and live inventory.</p>
            <hr>
            <div id="status" class="status-msg">Awaiting Action...</div>
        </div>
        <div class="content">
            <h2 class="section-header">Pending Submissions</h2>
            <div id="app-list"></div>
            
            <h2 class="section-header" style="margin-top: 50px;">Live Store Inventory</h2>
            <div id="live-list"></div>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script>
const CORRECT_PASS = "wuirfhuiesrhuigseuihfdghuiserghuiewrhuisgehuiwrsguhiersguhieruihgeruihghuiersghuiersuhigerhuigehuirghuierghuierghuiehiughuierghuieruihsgerhuighiuerghuierhuigehuirguiherghuierihugeuirhsghuierihugeruihghuierghuierghuirdhuigsdilhgresnfjroogvseviesrjvmsoeinvsioevlbnersbnrviusenrvusdnviusrdvnrnirdlintv745684375645873694648395673495689748346975436385764476543085734673757347853759375903793075930576395768390576493085769375639756937";

function checkPass() {
    if (document.getElementById('pass-input').value === CORRECT_PASS) {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-ui').style.display = 'flex';
        document.body.style.overflow = 'auto';
        initDashboard(); 
    } else {
        document.getElementById('fail-msg').style.display = 'block';
        document.getElementById('pass-input').value = "";
    }
}

document.getElementById('pass-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkPass(); });

async function initDashboard() {
    const PENDING_FILE = "apppending.xml";
    const FINAL_FILE = "apps.xml";
    const token = window.GITHUB_TOKEN;
    const owner = window.GITHUB_OWNER;
    const repo = window.GITHUB_REPO;
    
    const listContainer = document.getElementById('app-list');
    const liveContainer = document.getElementById('live-list');
    const status = document.getElementById('status');

    if (!token || !owner || !repo) {
        status.innerHTML = `<span style="color:red">Config Error! Check config.js</span>`;
        return;
    }

    async function getFile(path) {
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
        try {
            const res = await fetch(url, { headers: { "Authorization": `token ${token}` } });
            if (!res.ok) return null;
            const data = await res.json();
            return { sha: data.sha, content: decodeURIComponent(escape(atob(data.content))) };
        } catch (e) { return null; }
    }

    const pendingData = await getFile(PENDING_FILE);
    const finalData = await getFile(FINAL_FILE);

    function renderApps(xmlString, container, isLive) {
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlString, "text/xml");
        const apps = xmlDoc.getElementsByTagName("app");
        
        if (apps.length === 0) {
            container.innerHTML = `<p style="color:#888; font-style:italic;">No apps found.</p>`;
            return;
        }

        Array.from(apps).forEach(app => {
            const id = app.getAttribute("id");
            const name = app.getElementsByTagName("name")[0]?.textContent || "Unknown";
            const icon = app.getElementsByTagName("icon")[0]?.textContent || "";
            const pub = app.getElementsByTagName("publisher")[0]?.textContent || "Unknown";
            
            const card = document.createElement('div');
            card.className = 'app-card';
            card.innerHTML = `
                <img src="${icon}" class="app-icon" onerror="this.src='https://via.placeholder.com/80'">
                <div class="app-info">
                    <h2>${name}</h2>
                    <div class="details">ID: ${id} | Publisher: ${pub}</div>
                    <div class="controls">
                        ${isLive ? 
                            `<button class="action-btn btn-unpublish" onclick="unpublishApp('${id}')">Unpublish</button>` :
                            `<button class="action-btn btn-approve" onclick="processApp('${id}', true)">Approve</button>
                             <button class="action-btn btn-decline" onclick="processApp('${id}', false)">Decline</button>`
                        }
                    </div>
                </div>`;
            container.appendChild(card);
        });
    }

    if (pendingData) renderApps(pendingData.content, listContainer, false);
    if (finalData) renderApps(finalData.content, liveContainer, true);

    // ACTION: Approve or Decline
    window.processApp = async function(appId, isApproved) {
        status.innerText = "Processing...";
        const appRegex = new RegExp(`<app id="${appId}">[\\s\\S]*?<\\/app>`, 'g');
        const match = pendingData.content.match(appRegex);
        if (!match) return;

        const newPending = pendingData.content.replace(appRegex, "").replace(/\n\s*\n/g, '\n');
        let newFinal = null;

        if (isApproved) {
            newFinal = finalData.content.replace('</apps>', `    ${match[0]}\n</apps>`);
        }

        await commit(newPending, pendingData.sha, newFinal, finalData.sha);
    };

    // ACTION: Unpublish
    window.unpublishApp = async function(appId) {
        if (!confirm("Remove this app from the live store?")) return;
        status.innerText = "Removing...";
        const appRegex = new RegExp(`<app id="${appId}">[\\s\\S]*?<\\/app>`, 'g');
        const newFinal = finalData.content.replace(appRegex, "").replace(/\n\s*\n/g, '\n');
        await commit(null, null, newFinal, finalData.sha);
    };

    async function commit(pContent, pSha, fContent, fSha) {
        const headers = { "Authorization": `token ${token}`, "Content-Type": "application/json" };
        
        if (pContent !== null) {
            await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${PENDING_FILE}`, {
                method: "PUT", headers,
                body: JSON.stringify({ message: "Admin update", content: btoa(unescape(encodeURIComponent(pContent))), sha: pSha })
            });
        }
        if (fContent !== null) {
            await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${FINAL_FILE}`, {
                method: "PUT", headers,
                body: JSON.stringify({ message: "Store update", content: btoa(unescape(encodeURIComponent(fContent))), sha: fSha })
            });
        }
        location.reload();
    }
}
</script>
</body>
</html>

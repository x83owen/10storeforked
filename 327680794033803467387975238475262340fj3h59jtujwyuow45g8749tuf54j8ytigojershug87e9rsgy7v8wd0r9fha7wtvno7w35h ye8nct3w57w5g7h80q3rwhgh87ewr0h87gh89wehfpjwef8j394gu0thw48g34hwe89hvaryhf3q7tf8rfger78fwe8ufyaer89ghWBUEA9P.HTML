<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>10-Store | Admin Panel</title>
    <style>
        :root {
            --win-blue: #0078D7;
            --win-green: #107C10;
            --win-red: #E81123;
            --win-bg: #F2F2F2;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--win-bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* UI Overlays */
        #login-overlay, #edit-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
        }
        #edit-modal { display: none; background: rgba(0,0,0,0.8); z-index: 10000; }

        .modal-box, .login-box { background: white; padding: 25px; color: black; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .login-box { text-align: center; width: 300px; background: none; color: white; box-shadow: none; }
        
        .modal-box textarea { width: 100%; height: 300px; font-family: monospace; margin: 10px 0; }

        header { background: var(--win-blue); color: white; padding: 10px 25px; display: flex; align-items: center; }
        header h1 { margin: 0; font-size: 18px; font-weight: 400; }

        .main-layout { display: flex; flex: 1; overflow: hidden; }
        
        /* Sidebar Form Styling */
        .sidebar { width: 280px; background: #E6E6E6; padding: 20px; border-right: 1px solid #CCC; overflow-y: auto; }
        .sidebar input, .sidebar textarea { 
            width: 100%; padding: 6px; margin-bottom: 8px; 
            border: 1px solid #ccc; box-sizing: border-box; font-size: 12px;
        }
        .sidebar h4 { margin: 15px 0 5px 0; font-size: 14px; color: var(--win-blue); }

        .content { flex: 1; padding: 30px; overflow-y: auto; }
        .dashboard-container { max-width: 900px; margin: 0 auto; }

        .section-title { font-size: 20px; font-weight: 300; margin: 30px 0 15px; border-bottom: 1px solid #ccc; padding-bottom: 5px; }

        .app-card { background: white; border: 1px solid #DDD; padding: 20px; margin-bottom: 25px; display: flex; gap: 20px; }
        .app-icon { width: 80px; height: 80px; object-fit: contain; background: #f9f9f9; }
        
        .controls { margin-top: 15px; display: flex; gap: 10px; }
        button { padding: 6px 15px; border: none; cursor: pointer; font-size: 13px; }
        .btn-approve, .btn-upload { background: var(--win-green); color: white; }
        .btn-edit { background: var(--win-blue); color: white; }
        .btn-unpublish { background: #444; color: white; }
        
        #login-overlay input { width: 100%; padding: 10px; margin-bottom: 10px; background: rgba(0,0,0,0.2); border: 2px solid white; color: white; outline: none;}
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <div style="font-size:50px; margin-bottom:15px;">👤</div>
        <h2 style="font-weight:300;">10Store Admin</h2>
        <input type="password" id="pass-input" placeholder="Password" autofocus>
        <button style="width:100%; background:white; color:black;" onclick="checkPass()">Log on</button>
        <p id="fail-msg" style="color:#ffb3b3; display:none; margin-top:10px;">Access Denied</p>
    </div>
</div>

<div id="edit-modal">
    <div class="modal-box" style="width: 80%; max-width: 600px;">
        <h3>Edit XML Source</h3>
        <textarea id="xml-edit-area"></textarea>
        <button onclick="closeEdit()">Cancel</button>
        <button class="btn-approve" onclick="saveXmlEdit()">Save Changes</button>
    </div>
</div>

<header><h1>10Store Admin Panel</h1></header>

<div class="main-layout">
    <div class="sidebar">
        <h3>Direct Uploader</h3>
        <p style="font-size:11px; color:#666;">Push an app directly to the live store.</p>
        
        <h4>App Details</h4>
        <input type="text" id="up-name" placeholder="App Name">
        <input type="text" id="up-id" placeholder="App ID (e.g. my.app.name)">
        <input type="text" id="up-pub" placeholder="Publisher">
        <input type="text" id="up-ver" placeholder="Version (e.g. 1.0.0)">
        <textarea id="up-desc" placeholder="Description" style="height:60px;"></textarea>
        
        <h4>Assets</h4>
        <input type="text" id="up-icon" placeholder="Icon Link (.png/.jpg)">
        <input type="text" id="up-pkg" placeholder="Package Link (.zip/.exe)">
        
        <label style="font-size:12px;"><input type="checkbox" id="up-feat"> Featured App</label>
        
        <button class="btn-upload" style="width:100%; margin-top:15px;" onclick="directUpload()">Upload to Store</button>
        
        <hr style="margin:20px 0;">
        <div id="status" style="font-size:12px; font-weight:bold;">Waiting...</div>
        <div class="stats-box" style="margin-top:10px; font-size:12px;">
            Live Apps: <strong id="live-count">0</strong>
        </div>
    </div>

    <div class="content">
        <div class="dashboard-container">
            <h2 class="section-title">Pending Submissions</h2>
            <div id="app-list"></div>
            
            <h2 class="section-title">Live Inventory</h2>
            <div id="live-list"></div>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script src="pasw.js"></script>
<script>
let currentEditingId = null;
let cachedFinalData = null;
let cachedPendingData = null;

function checkPass() {
    if (document.getElementById('pass-input').value === PASSW) {
        document.getElementById('login-overlay').style.display = 'none';
        setTimeout(initDashboard, 100);
    } else {
        document.getElementById('fail-msg').style.display = 'block';
    }
}

async function initDashboard() {
    const token = window.GITHUB_TOKEN;
    const owner = window.GITHUB_OWNER;
    const repo = window.GITHUB_REPO;
    const PENDING_FILE = "apppending.xml";
    const FINAL_FILE = "apps.xml";

    document.getElementById('status').innerText = "Connected";

    async function getFile(path) {
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
        try {
            const res = await fetch(url, { headers: { "Authorization": `token ${token}` } });
            if (!res.ok) return null;
            const data = await res.json();
            return { sha: data.sha, content: decodeURIComponent(escape(atob(data.content))) };
        } catch (e) { return null; }
    }

    cachedFinalData = await getFile(FINAL_FILE);
    cachedPendingData = await getFile(PENDING_FILE);

    function render(xmlContent, container, isLive) {
        container.innerHTML = "";
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlContent, "text/xml");
        const apps = xmlDoc.getElementsByTagName("app");
        if(apps.length === 0) { container.innerHTML = "<p style='color:#999;'>No apps found.</p>"; return; }

        Array.from(apps).forEach(app => {
            const id = app.getAttribute("id");
            const name = app.getElementsByTagName("name")[0]?.textContent || "Unnamed";
            const icon = app.getElementsByTagName("icon")[0]?.textContent || "";
            
            const card = document.createElement('div');
            card.className = 'app-card';
            card.innerHTML = `
                <img src="${icon}" class="app-icon" onerror="this.src='https://via.placeholder.com/80?text=App'">
                <div style="flex:1;">
                    <h2 style="margin:0; font-weight:400; font-size:18px;">${name}</h2>
                    <code style="font-size:11px; color:#666;">${id}</code>
                    <div class="controls">
                        ${isLive ? 
                            `<button class="btn-edit" onclick="openEdit('${id}')">Edit XML</button>
                             <button class="btn-unpublish" onclick="removeLive('${id}')">Unpublish</button>` :
                            `<input type="checkbox" id="feat-${id}"> Featured
                             <button class="btn-decline" onclick="processApp('${id}', false)">Decline</button>
                             <button class="btn-approve" onclick="processApp('${id}', true)">Approve</button>`
                        }
                    </div>
                </div>`;
            container.appendChild(card);
        });
        if(isLive) document.getElementById('live-count').innerText = apps.length;
    }

    if(cachedPendingData) render(cachedPendingData.content, document.getElementById('app-list'), false);
    if(cachedFinalData) render(cachedFinalData.content, document.getElementById('live-list'), true);

    // Direct Uploader Logic
    window.directUpload = async function() {
        const name = document.getElementById('up-name').value;
        const id = document.getElementById('up-id').value;
        const pub = document.getElementById('up-pub').value;
        const ver = document.getElementById('up-ver').value;
        const desc = document.getElementById('up-desc').value;
        const icon = document.getElementById('up-icon').value;
        const pkg = document.getElementById('up-pkg').value;
        const feat = document.getElementById('up-feat').checked;

        if(!name || !id || !pkg) { alert("Name, ID, and Package are required!"); return; }

        const newAppXml = `
    <app id="${id}">
        <name>${name}</name>
        <icon>${icon}</icon>
        <version>${ver}</version>
        <publisher>${pub}</publisher>
        <description>${desc}</description>
        <package>${pkg}</package>
        <featured>${feat}</featured>
    </app>`;

        document.getElementById('status').innerText = "Uploading...";
        const newFinal = cachedFinalData.content.replace('</apps>', `${newAppXml}\n</apps>`);
        await commit(null, null, newFinal, cachedFinalData.sha);
    };

    window.openEdit = function(appId) {
        currentEditingId = appId;
        const appRegex = new RegExp(`<app id="${appId}">[\\s\\S]*?<\\/app>`);
        const match = cachedFinalData.content.match(appRegex);
        if (match) {
            document.getElementById('xml-edit-area').value = match[0].trim();
            document.getElementById('edit-modal').style.display = 'flex';
        }
    };

    window.saveXmlEdit = async function() {
        const newXml = document.getElementById('xml-edit-area').value;
        const appRegex = new RegExp(`<app id="${currentEditingId}">[\\s\\S]*?<\\/app>`);
        const newFinal = cachedFinalData.content.replace(appRegex, newXml);
        document.getElementById('status').innerText = "Saving...";
        await commit(null, null, newFinal, cachedFinalData.sha);
    };

    window.processApp = async function(appId, isApproved) {
        document.getElementById('status').innerText = "Processing...";
        const appRegex = new RegExp(`<app id="${appId}">[\\s\\S]*?<\\/app>`, 'g');
        const match = cachedPendingData.content.match(appRegex);
        if (!match) return;

        let appXml = match[0];
        const isFeatured = document.getElementById(`feat-${appId}`)?.checked;
        appXml = appXml.replace(/<featured>.*?<\/featured>/, `<featured>${isFeatured}</featured>`);

        const newPending = cachedPendingData.content.replace(appRegex, "").replace(/\n\s*\n/g, '\n');
        let newFinal = isApproved ? cachedFinalData.content.replace('</apps>', `    ${appXml}\n</apps>`) : null;

        await commit(newPending, cachedPendingData.sha, newFinal, cachedFinalData.sha);
    };

    window.removeLive = async function(appId) {
        if(!confirm("Remove from store?")) return;
        document.getElementById('status').innerText = "Removing...";
        const appRegex = new RegExp(`<app id="${appId}">[\\s\\S]*?<\\/app>`, 'g');
        const newFinal = cachedFinalData.content.replace(appRegex, "").replace(/\n\s*\n/g, '\n');
        await commit(null, null, newFinal, cachedFinalData.sha);
    };

    async function commit(pContent, pSha, fContent, fSha) {
        const headers = { "Authorization": `token ${token}`, "Content-Type": "application/json" };
        if (pContent !== null) {
            await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${PENDING_FILE}`, {
                method: "PUT", headers,
                body: JSON.stringify({ message: "Admin: Queue Update", content: btoa(unescape(encodeURIComponent(pContent))), sha: pSha })
            });
        }
        if (fContent !== null) {
            await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${FINAL_FILE}`, {
                method: "PUT", headers,
                body: JSON.stringify({ message: "Admin: Store Update", content: btoa(unescape(encodeURIComponent(fContent))), sha: fSha })
            });
        }
        location.reload();
    }
}

window.closeEdit = () => document.getElementById('edit-modal').style.display = 'none';
</script>
</body>
</html>

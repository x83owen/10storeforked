<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>10-Store | Admin Panel</title>
    <style>
        :root {
            --win-blue: #0078D7;
            --win-green: #107C10;
            --win-red: #E81123;
            --win-bg: #F2F2F2;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--win-bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(20px);
            z-index: 9999; display: flex; align-items: center; justify-content: center; color: white;
        }

        .login-box { text-align: center; width: 300px; }
        .user-avatar { width: 120px; height: 120px; background: #888; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 50px; }
        .login-box input { width: 100%; padding: 8px; border: 2px solid rgba(255,255,255,0.5); background: rgba(0,0,0,0.2); color: white; box-sizing: border-box; outline: none; margin-bottom: 10px; }
        .login-box button { background: rgba(255,255,255,0.2); border: 2px solid white; color: white; width: 100%; padding: 8px; cursor: pointer; }

        #edit-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 10000; align-items: center; justify-content: center; }
        .modal-box { background: white; width: 80%; max-width: 700px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-box textarea { width: 100%; height: 300px; font-family: 'Consolas', monospace; font-size: 13px; margin: 15px 0; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; }

        header { background: var(--win-blue); color: white; padding: 10px 25px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10; }
        header h1 { margin: 0; font-size: 18px; font-weight: 400; }

        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 280px; background: #E6E6E6; padding: 20px; border-right: 1px solid #CCC; overflow-y: auto; }
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        
        .section-title { font-size: 18px; font-weight: 300; margin: 20px 0 10px; border-bottom: 1px solid #ccc; padding-bottom: 5px; color: var(--win-blue); }

        .upload-form input, .upload-form textarea { width: 100%; padding: 5px; margin-bottom: 8px; border: 1px solid #ccc; font-size: 12px; box-sizing: border-box; }
        .upload-form textarea { resize: none; }
        
        .cat-item { background: #DDD; padding: 5px 10px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .cat-item button { padding: 2px 5px; font-size: 10px; margin-left: 2px; }

        .app-card { background: white; border: 1px solid #DDD; padding: 15px; margin-bottom: 15px; display: flex; gap: 15px; }
        .app-icon { width: 60px; height: 60px; object-fit: contain; background: #EEE; }
        .app-info h2 { margin: 0; font-size: 18px; font-weight: 400; }
        
        button { cursor: pointer; border: none; padding: 5px 10px; font-size: 12px; }
        .btn-approve { background: var(--win-green); color: white; }
        .btn-red { background: var(--win-red); color: white; }
        .btn-blue { background: var(--win-blue); color: white; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <div class="user-avatar">👤</div>
        <h2>10Store Admin</h2>
        <input type="password" id="pass-input" placeholder="Password" autofocus>
        <button onclick="checkPass()">Log on</button>
        <p id="fail-msg" style="color:red; display:none;">Incorrect Password</p>
    </div>
</div>

<div id="edit-modal">
    <div class="modal-box">
        <h3 id="modal-title">Edit XML</h3>
        <textarea id="xml-edit-area"></textarea>
        <div style="text-align:right;">
            <button onclick="closeEdit()">Cancel</button>
            <button class="btn-approve" onclick="saveXmlEdit()">Save</button>
        </div>
    </div>
</div>

<header><h1>10Store Admin Panel</h1></header>

<div class="main-layout">
    <div class="sidebar">
        <div id="status" style="font-weight:bold; margin-bottom:10px;">Waiting</div>
        
        <div class="section-title">Categories</div>
        <div id="category-list"></div>
        <div style="margin-top:10px; display:flex; gap:2px;">
            <input type="text" id="new-cat-name" placeholder="New Category" style="flex:1; padding:4px;">
            <button class="btn-blue" onclick="addCategory()">+</button>
        </div>

        <div class="section-title">Quick Upload</div>
        <div class="upload-form">
            <input type="text" id="up-name" placeholder="App Name">
            <input type="text" id="up-pub" placeholder="Publisher">
            <input type="text" id="up-ver" placeholder="Version">
            <input type="text" id="up-icon" placeholder="Icon URL">
            <input type="text" id="up-pkg" placeholder="Package URL">
            <textarea id="up-desc" placeholder="Description" style="height:50px;"></textarea>
            <div style="font-size:11px;">
                <label><input type="checkbox" id="up-feat"> Featured</label>
                <label><input type="checkbox" id="up-pc" checked> PC</label>
                <label><input type="checkbox" id="up-mob" checked> Mob</label>
            </div>
            <button class="btn-approve" style="width:100%; margin-top:5px;" onclick="directUpload()">Publish App</button>
        </div>
    </div>

    <div class="content">
        <h2 class="section-title">Pending</h2>
        <div id="app-list"></div>
        <h2 class="section-title">Published</h2>
        <div id="live-list"></div>
    </div>
</div>

<script src="config.js"></script>
<script src="pasw.js"></script>
<script>
let cachedFinalData = null;
let cachedPendingData = null;

function checkPass() {
    if (document.getElementById('pass-input').value === PASSW) {
        document.getElementById('login-overlay').style.display = 'none';
        initDashboard();
    } else { document.getElementById('fail-msg').style.display = 'block'; }
}

async function initDashboard() {
    const status = document.getElementById('status');
    const token = window.GITHUB_TOKEN || GITHUB_TOKEN;
    const owner = window.GITHUB_OWNER || GITHUB_OWNER;
    const repo = window.GITHUB_REPO || GITHUB_REPO;

    async function getFile(path) {
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
        try {
            const res = await fetch(url, { headers: { "Authorization": `token ${token}` } });
            const data = await res.json();
            return { sha: data.sha, content: decodeURIComponent(escape(atob(data.content))) };
        } catch (e) { return null; }
    }

    cachedFinalData = await getFile("apps.xml");
    cachedPendingData = await getFile("apppending.xml");

    if (cachedFinalData) {
        status.innerText = "Connected";
        renderCategories();
        renderApps(cachedFinalData.content, 'live-list', true);
        if(cachedPendingData) renderApps(cachedPendingData.content, 'app-list', false);
    }

    function renderCategories() {
        const list = document.getElementById('category-list');
        list.innerHTML = "";
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(cachedFinalData.content, "text/xml");
        const cats = xmlDoc.getElementsByTagName("category");

        Array.from(cats).forEach(cat => {
            const title = cat.getAttribute("title");
            const type = cat.getAttribute("type");
            if (type === "featured") return; // Skip featured as requested

            const div = document.createElement('div');
            div.className = 'cat-item';
            div.innerHTML = `
                <span>${title}</span>
                <div>
                    <button onclick="renameCategory('${title}')">✎</button>
                    <button class="btn-red" onclick="deleteCategory('${title}')">×</button>
                </div>`;
            list.appendChild(div);
        });
    }

    function renderApps(xmlContent, containerId, isLive) {
        const container = document.getElementById(containerId);
        container.innerHTML = "";
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlContent, "text/xml");
        const apps = xmlDoc.getElementsByTagName("app");

        Array.from(apps).forEach(app => {
            const id = app.getAttribute("id");
            const name = app.getElementsByTagName("name")[0].textContent;
            const icon = app.getElementsByTagName("icon")[0].textContent;
            const card = document.createElement('div');
            card.className = 'app-card';
            card.innerHTML = `
                <img src="${icon}" class="app-icon">
                <div class="app-info">
                    <h2>${name}</h2>
                    <p style="font-size:10px; color:#666; margin:0;">ID: ${id}</p>
                    <button class="btn-blue" onclick="openEdit('${id}')">Edit XML</button>
                    ${isLive ? `<button class="btn-red" onclick="removeLive('${id}')">Remove</button>` : ''}
                </div>`;
            container.appendChild(card);
        });
    }

    window.addCategory = async () => {
        const name = document.getElementById('new-cat-name').value;
        if(!name) return;
        const newCatXml = `    <category title="${name}" type="picks">\n      <appIds></appIds>\n    </category>`;
        const updatedXml = cachedFinalData.content.replace('</categories>', `${newCatXml}\n  </categories>`);
        await commit(updatedXml);
    };

    window.renameCategory = async (oldName) => {
        const newName = prompt("Rename category to:", oldName);
        if(!newName || newName === oldName) return;
        const updatedXml = cachedFinalData.content.replace(`title="${oldName}"`, `title="${newName}"`);
        await commit(updatedXml);
    };

    window.deleteCategory = async (name) => {
        if(!confirm(`Delete category "${name}"?`)) return;
        const regex = new RegExp(`\\s*<category title="${name}"[\\s\\S]*?<\\/category>`, 'g');
        const updatedXml = cachedFinalData.content.replace(regex, "");
        await commit(updatedXml);
    };

    window.directUpload = async () => {
        const name = document.getElementById('up-name').value;
        const id = name.toLowerCase().replace(/[^a-z0-9]/g, '-');
        const appXml = `
    <app id="${id}">
        <name>${name}</name>
        <version>${document.getElementById('up-ver').value}</version>
        <icon>${document.getElementById('up-icon').value}</icon>
        <publisher>${document.getElementById('up-pub').value}</publisher>
        <featured>${document.getElementById('up-feat').checked}</featured>
        <description>${document.getElementById('up-desc').value}</description>
        <package>${document.getElementById('up-pkg').value}</package>
        <pcCapable>${document.getElementById('up-pc').checked}</pcCapable>
        <mobileCapable>${document.getElementById('up-mob').checked}</mobileCapable>
    </app>`;
        const updatedXml = cachedFinalData.content.replace('</apps>', `${appXml}\n</apps>`);
        await commit(updatedXml);
    };

    async function commit(newXml) {
        status.innerText = "Saving...";
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/apps.xml`;
        const res = await fetch(url, {
            method: "PUT",
            headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
            body: JSON.stringify({
                message: "Admin Update",
                content: btoa(unescape(encodeURIComponent(newXml))),
                sha: cachedFinalData.sha
            })
        });
        if(res.ok) location.reload();
    }
}
</script>
</body>
</html>

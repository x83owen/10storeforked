<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>10-Store | Admin Review</title>
    <style>
        :root {
            --win-blue: #0078D7;
            --win-green: #107C10;
            --win-red: #E81123;
            --win-bg: #F2F2F2;
        }

        /* HIDDEN BY DEFAULT - This is the key change */
        #main-ui-wrapper {
            display: none; 
            flex-direction: column;
            height: 100vh;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--win-bg); 
            margin: 0; 
            overflow: hidden; /* Prevent scrolling until logged in */
        }

        /* Login Overlay stays visible on page load */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .login-box { text-align: center; width: 300px; }
        .user-avatar {
            width: 120px; height: 120px;
            background: #888; border-radius: 50%;
            margin: 0 auto 20px; display: flex;
            align-items: center; justify-content: center;
            font-size: 50px; border: 2px solid white;
        }

        .login-box input {
            width: 100%; padding: 10px;
            border: 2px solid rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.4);
            color: white; outline: none; margin-bottom: 10px;
        }

        .login-box button {
            background: var(--win-blue); border: none;
            color: white; width: 100%; padding: 10px; cursor: pointer;
        }

        /* Header & Layout Styles */
        header { background: var(--win-blue); color: white; padding: 10px 25px; }
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 250px; background: #E6E6E6; padding: 20px; border-right: 1px solid #CCC; }
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        .app-card { background: white; border: 1px solid #DDD; padding: 20px; margin-bottom: 25px; display: flex; gap: 25px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <div class="user-avatar">👤</div>
        <h2 style="font-weight:300;">Administrator</h2>
        <input type="password" id="pass-input" placeholder="Password" autofocus>
        <button onclick="checkPass()">Sign in</button>
        <p id="fail-msg" style="color:#ff8080; display:none; margin-top:10px;">Incorrect password.</p>
    </div>
</div>

<div id="main-ui-wrapper">
    <header>
        <h1>10-Store App Management</h1>
    </header>

    <div class="main-layout">
        <div class="sidebar">
            <h3>Dashboard</h3>
            <p>Review submissions.</p>
            <hr>
            <div id="status">Authenticated</div>
        </div>

        <div class="content">
            <div id="app-list"></div>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script>
const CORRECT_PASS = "wuirfhuiesrhuigseuihfdghuiserghuiewrhuisgehuiwrsguhiersguhieruihgeruihghuiersghuiersuhigerhuigehuirghuierghuierghuiehiughuierghuieruihsgerhuighiuerghuierhuigehuirguiherghuierihugeuirhsghuierihugeruihghuierghuierghuirdhuigsdilhgresnfjroogvseviesrjvmsoeinvsioevlbnersbnrviusenrvusdnviusrdvnrnirdlintv745684375645873694648395673495689748346975436385764476543085734673757347853759375903793075930576395768390576493085769375639756937";

function checkPass() {
    const input = document.getElementById('pass-input').value;
    if (input === CORRECT_PASS) {
        // Hide Login
        document.getElementById('login-overlay').style.display = 'none';
        // Show Dashboard
        document.getElementById('main-ui-wrapper').style.display = 'flex';
        // Enable Scrolling
        document.body.style.overflow = 'auto';
        
        initDashboard(); 
    } else {
        document.getElementById('fail-msg').style.display = 'block';
    }
}

// Allow Enter key
document.getElementById('pass-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') checkPass();
});

}
</script>
</body>
</html>

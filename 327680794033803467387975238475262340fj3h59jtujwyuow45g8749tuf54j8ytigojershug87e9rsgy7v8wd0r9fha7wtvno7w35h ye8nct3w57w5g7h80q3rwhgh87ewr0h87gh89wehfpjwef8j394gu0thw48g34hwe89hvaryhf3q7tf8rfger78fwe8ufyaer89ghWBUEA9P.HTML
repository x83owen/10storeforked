<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>10-Store | Admin Panel</title>
    <style>
        :root {
            --win-blue: #0078D7;
            --win-green: #107C10;
            --win-red: #E81123;
            --win-bg: #F2F2F2;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--win-bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(20px);
            z-index: 9999; display: flex; align-items: center; justify-content: center; color: white;
        }

        .login-box { text-align: center; width: 300px; }
        .user-avatar { width: 120px; height: 120px; background: #888; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 50px; }
        .login-box input { width: 100%; padding: 8px; border: 2px solid rgba(255,255,255,0.5); background: rgba(0,0,0,0.2); color: white; box-sizing: border-box; outline: none; margin-bottom: 10px; }
        .login-box button { background: rgba(255,255,255,0.2); border: 2px solid white; color: white; width: 100%; padding: 8px; cursor: pointer; }

        #edit-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 10000; align-items: center; justify-content: center; }
        .modal-box { background: white; width: 80%; max-width: 700px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-box textarea { width: 100%; height: 300px; font-family: 'Consolas', monospace; font-size: 13px; margin: 15px 0; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; }

        header { background: var(--win-blue); color: white; padding: 10px 25px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10; }
        header h1 { margin: 0; font-size: 18px; font-weight: 400; }

        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 260px; background: #E6E6E6; padding: 20px; border-right: 1px solid #CCC; overflow-y: auto; }
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        .dashboard-container { max-width: 900px; margin: 0 auto; }

        .section-title { font-size: 20px; font-weight: 300; margin: 30px 0 15px; border-bottom: 1px solid #ccc; padding-bottom: 5px; color: #333; }

        .upload-form input, .upload-form textarea { width: 100%; padding: 5px; margin-bottom: 8px; border: 1px solid #ccc; font-size: 12px; box-sizing: border-box; }
        .upload-form textarea { resize: none; }
        .upload-form h4 { margin: 10px 0 5px; font-size: 13px; color: var(--win-blue); }
        
        .check-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .check-group label { font-size: 11px; display: flex; align-items: center; gap: 3px; }

        .app-card { background: white; border: 1px solid #DDD; padding: 20px; margin-bottom: 25px; display: flex; gap: 25px; position: relative; }
        .app-icon { width: 100px; height: 100px; object-fit: contain; background: #F0F0F0; border: 1px solid #EEE; }
        .app-info { flex-grow: 1; }
        .app-info h2 { margin: 0 0 5px 0; color: #333; font-weight: 300; font-size: 22px; }
        .pub-text { color: #666; font-size: 13px; margin-bottom: 10px; }

        .controls { margin-top: 15px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        button { padding: 6px 20px; border: none; cursor: pointer; font-size: 13px; }
        .btn-approve { background: var(--win-green); color: white; }
        .btn-decline { background: #CCC; color: black; }
        .btn-unpublish { background: #444; color: white; }
        .btn-edit { background: var(--win-blue); color: white; }

        /* New Category UI Styles */
        .cat-manager { margin-top: 20px; padding: 10px; background: #ddd; border: 1px solid #ccc; }
        .cat-item { display: flex; justify-content: space-between; align-items: center; font-size: 12px; margin-bottom: 5px; background: #eee; padding: 4px; }
        .cat-item div { display: flex; gap: 4px; }
        .btn-tiny { padding: 2px 5px; font-size: 10px; }

        .stats-box { background: white; border: 1px solid #CCC; padding: 15px; margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <div class="user-avatar">👤</div>
        <h2 style="font-weight:300;">10Store Admin</h2>
        <input type="password" id="pass-input" placeholder="Password" autofocus>
        <button onclick="checkPass()">Log on</button>
        <p id="fail-msg" style="color:#ffb3b3; display:none; margin-top:10px;">Error</p>
    </div>
</div>

<div id="edit-modal">
    <div class="modal-box">
        <h3 style="margin-top:0;">Edit XML</h3>
        <textarea id="xml-edit-area"></textarea>
        <div style="text-align:right;">
            <button onclick="closeEdit()">Cancel</button>
            <button class="btn-approve" onclick="saveXmlEdit()">Save Changes</button>
        </div>
    </div>
</div>

<header><h1>10Store Admin Panel</h1></header>

<div class="main-layout">
    <div class="sidebar">
        <h3>Dashboard</h3>
        <div id="status" style="font-size:13px; color:#666; margin-bottom: 10px;">Waiting</div>
        <hr>
        
        <div class="upload-form">
            <h4 style="margin-top:0;">Quick Upload</h4>
            <input type="text" id="up-name" placeholder="App Name">
            <input type="text" id="up-pub" placeholder="Publisher">
            <input type="text" id="up-ver" placeholder="Version">
            <input type="text" id="up-icon" placeholder="Icon URL">
            <input type="text" id="up-pkg" placeholder="Package URL">
            <textarea id="up-desc" placeholder="Description" style="height:60px;"></textarea>
            
            <div class="check-group">
                <label><input type="checkbox" id="up-feat"> Featured</label>
                <label><input type="checkbox" id="up-pc" checked> PC</label>
                <label><input type="checkbox" id="up-mob" checked> Mobile</label>
            </div>
            
            <button class="btn-approve" style="width:100%; margin-top:5px;" onclick="directUpload()">Publish</button>
        </div>

        <div class="cat-manager">
            <h4 style="margin:0 0 10px 0; font-size:13px;">Categories</h4>
            <div id="cat-list"></div>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <input type="text" id="new-cat-input" placeholder="New..." style="width:70%; font-size:11px;">
                <button onclick="addCategory()" style="padding:2px 8px;">Add</button>
            </div>
        </div>

        <div class="stats-box">
            Live Apps: <strong id="live-count">...</strong>
        </div>
    </div>

    <div class="content">
        <div class="dashboard-container">
            <h2 class="section-title">Pending</h2>
            <div id="app-list"></div>
            
            <h2 class="section-title">Published</h2>
            <div id="live-list"></div>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script src="pasw.js"></script>
<script>
let currentEditingId = null;
let currentEditingType = 'app'; // 'app' or 'cat'
let cachedFinalData = null;
let cachedPendingData = null;

function checkPass() {
    const val = document.getElementById('pass-input').value;
    if (val === PASSW) {
        document.getElementById('login-overlay').style.display = 'none';
        initDashboard();
    } else {
        document.getElementById('fail-msg').style.display = 'block';
    }
}

async function initDashboard() {
    const token = window.GITHUB_TOKEN || GITHUB_TOKEN;
    const owner = window.GITHUB_OWNER || GITHUB_OWNER;
    const repo = window.GITHUB_REPO || GITHUB_REPO;
    const status = document.getElementById('status');
    const PENDING_FILE = "apppending.xml";
    const FINAL_FILE = "apps.xml";

    async function getFile(path) {
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
        try {
            const res = await fetch(url, { headers: { "Authorization": `token ${token}` } });
            if (!res.ok) return null;
            const data = await res.json();
            return { sha: data.sha, content: decodeURIComponent(escape(atob(data.content))) };
        } catch (e) { return null; }
    }

    cachedFinalData = await getFile(FINAL_FILE);
    cachedPendingData = await getFile(PENDING_FILE);

    if (cachedFinalData || cachedPendingData) {
        status.innerText = "Connected";
        renderCategories();
    } else {
        status.innerText = "Error Loading Files";
    }

    function renderCategories() {
        const container = document.getElementById('cat-list');
        container.innerHTML = "";
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(cachedFinalData.content, "text/xml");
        const cats = xmlDoc.getElementsByTagName("category");

        Array.from(cats).forEach(cat => {
            const title = cat.getAttribute("title");
            const type = cat.getAttribute("type");
            if (type === "featured") return;

            const item = document.createElement('div');
            item.className = 'cat-item';
            item.innerHTML = `
                <span>${title}</span>
                <div>
                    <button class="btn-tiny" onclick="renameCat('${title}')">✎</button>
                    <button class="btn-tiny" style="background:#ffb3b3" onclick="deleteCat('${title}')">✕</button>
                </div>
            `;
            container.appendChild(item);
        });
    }

    function render(xmlContent, container, isLive) {
        container.innerHTML = "";
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlContent, "text/xml");
        const apps = xmlDoc.getElementsByTagName("app");
        if(apps.length === 0) { container.innerHTML = "<p>Empty</p>"; return; }

        Array.from(apps).forEach(app => {
            const id = app.getAttribute("id");
            const name = app.getElementsByTagName("name")[0].textContent;
            const icon = app.getElementsByTagName("icon")[0].textContent;
            
            const card = document.createElement('div');
            card.className = 'app-card';
            card.innerHTML = `
                <img src="${icon}" class="app-icon" onerror="this.src='https://via.placeholder.com/100'">
                <div class="app-info">
                    <h2>${name}</h2>
                    <div class="pub-text">ID: ${id}</div>
                    <div class="controls">
                        ${isLive ? 
                            `<button class="btn-edit" onclick="openEdit('${id}')">Edit</button>
                             <button class="btn-unpublish" onclick="removeLive('${id}')">Unpublish</button>` :
                            `<button class="btn-approve" onclick="alert('Logic for approve not set')">Approve</button>`
                        }
                    </div>
                </div>`;
            container.appendChild(card);
        });
        if(isLive) document.getElementById('live-count').innerText = apps.length;
    }

    if(cachedPendingData) render(cachedPendingData.content, document.getElementById('app-list'), false);
    if(cachedFinalData) render(cachedFinalData.content, document.getElementById('live-list'), true);

    window.addCategory = async function() {
        const name = document.getElementById('new-cat-input').value;
        if(!name) return;
        const newXml = `    <category title="${name}" type="picks">\n      <appIds></appIds>\n    </category>`;
        const updated = cachedFinalData.content.replace('</categories>', `${newXml}\n  </categories>`);
        await commit(null, null, updated, cachedFinalData.sha);
    };

    window.renameCat = async function(oldName) {
        const newName = prompt("New name for " + oldName, oldName);
        if(!newName || newName === oldName) return;
        const updated = cachedFinalData.content.replace(`title="${oldName}"`, `title="${newName}"`);
        await commit(null, null, updated, cachedFinalData.sha);
    };

    window.deleteCat = async function(name) {
        if(!confirm("Delete " + name + "?")) return;
        const regex = new RegExp(`\\s*<category title="${name}"[\\s\\S]*?<\\/category>`, 'g');
        const updated = cachedFinalData.content.replace(regex, "");
        await commit(null, null, updated, cachedFinalData.sha);
    };

    window.directUpload = async function() {
        const nameVal = document.getElementById('up-name').value;
        const idVal = nameVal.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
        const appXml = `
    <app id="${idVal}">
        <name>${nameVal}</name>
        <version>${document.getElementById('up-ver').value}</version>
        <icon>${document.getElementById('up-icon').value}</icon>
        <publisher>${document.getElementById('up-pub').value}</publisher>
        <featured>${document.getElementById('up-feat').checked}</featured>
        <description>${document.getElementById('up-desc').value}</description>
        <package>${document.getElementById('up-pkg').value}</package>
        <pcCapable>${document.getElementById('up-pc').checked}</pcCapable>
        <mobileCapable>${document.getElementById('up-mob').checked}</mobileCapable>
    </app>`;
        const newFinal = cachedFinalData.content.replace('</apps>', `${appXml}\n</apps>`);
        await commit(null, null, newFinal, cachedFinalData.sha);
    }

    window.openEdit = (id) => {
        currentEditingId = id;
        const match = cachedFinalData.content.match(new RegExp(`<app id="${id}">[\\s\\S]*?<\\/app>`));
        if (match) {
            document.getElementById('xml-edit-area').value = match[0].trim();
            document.getElementById('edit-modal').style.display = 'flex';
        }
    };

    window.closeEdit = () => document.getElementById('edit-modal').style.display = 'none';

    window.saveXmlEdit = async () => {
        const newXml = document.getElementById('xml-edit-area').value;
        const newFinal = cachedFinalData.content.replace(new RegExp(`<app id="${currentEditingId}">[\\s\\S]*?<\\/app>`), newXml);
        await commit(null, null, newFinal, cachedFinalData.sha);
    };

    window.removeLive = async (id) => {
        if(!confirm("Remove?")) return;
        const newFinal = cachedFinalData.content.replace(new RegExp(`<app id="${id}">[\\s\\S]*?<\\/app>`, 'g'), "").replace(/\n\s*\n/g, '\n');
        await commit(null, null, newFinal, cachedFinalData.sha);
    };

    async function commit(pContent, pSha, fContent, fSha) {
        status.innerText = "Saving...";
        const headers = { "Authorization": `token ${token}`, "Content-Type": "application/json" };
        await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${FINAL_FILE}`, {
            method: "PUT", headers,
            body: JSON.stringify({ message: "Admin Update", content: btoa(unescape(encodeURIComponent(fContent))), sha: fSha })
        });
        location.reload();
    }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>10-Store | Admin Review</title>
    <style>
        :root {
            --win-blue: #0078D7;
            --win-green: #107C10;
            --win-red: #E81123;
            --win-bg: #F2F2F2;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--win-bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            height: 100vh;
            overflow: hidden; /* Lock scroll until login */
        }

        /* Login Overlay - Forces full screen coverage */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .login-box { text-align: center; width: 300px; }

        .user-avatar {
            width: 120px; height: 120px;
            background: #888; border-radius: 50%;
            margin: 0 auto 20px; display: flex;
            align-items: center; justify-content: center;
            font-size: 50px; border: 2px solid white;
        }

        .login-box input {
            width: 100%; padding: 10px;
            border: 2px solid rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.3);
            color: white; box-sizing: border-box;
            outline: none; margin-bottom: 15px;
        }

        .login-box input:focus { border-color: white; }

        .login-box button {
            background: rgba(255,255,255,0.2);
            border: 2px solid white; color: white;
            width: 100%; padding: 10px; cursor: pointer;
            font-weight: bold;
        }

        .login-box button:hover { background: rgba(255,255,255,0.4); }

        /* Dashboard UI (Hidden until login) */
        #main-ui { display: none; flex-direction: column; height: 100%; }

        header { background: var(--win-blue); color: white; padding: 10px 25px; display: flex; align-items: center; }
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 250px; background: #E6E6E6; padding: 20px; border-right: 1px solid #CCC; }
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        .app-card { background: white; border: 1px solid #DDD; padding: 20px; margin-bottom: 25px; display: flex; gap: 25px; }
        .app-icon { width: 120px; height: 120px; object-fit: contain; background: #F0F0F0; }
        .controls { margin-top: 20px; display: flex; gap: 12px; align-items: center; }
        .btn-approve { background: var(--win-green); color: white; padding: 8px 24px; border: none; cursor: pointer; }
        .btn-decline { background: #CCC; color: black; padding: 8px 24px; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <div class="user-avatar">👤</div>
        <h2 style="font-weight:300;">Administrator</h2>
        <input type="password" id="pass-input" placeholder="Password" autofocus autocomplete="off">
        <button onclick="checkPass()">Sign in</button>
        <p id="fail-msg" style="color:#ffb3b3; display:none; margin-top:10px;">Access Denied.</p>
    </div>
</div>

<div id="main-ui">
    <header><h1>10-Store App Management</h1></header>
    <div class="main-layout">
        <div class="sidebar">
            <h3>Dashboard</h3>
            <p style="font-size: 13px; color: #555;">Review submissions.</p>
            <hr>
            <div id="status" class="status-msg">Authenticated</div>
        </div>
        <div class="content">
            <div id="app-list"></div>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script>
// FORCE CLEAR INPUT ON LOAD (Security)
document.getElementById('pass-input').value = "";

const CORRECT_PASS = "wuirfhuiesrhuigseuihfdghuiserghuiewrhuisgehuiwrsguhiersguhieruihgeruihghuiersghuiersuhigerhuigehuirghuierghuierghuiehiughuierghuieruihsgerhuighiuerghuierhuigehuirguiherghuierihugeuirhsghuierihugeruihghuierghuierghuirdhuigsdilhgresnfjroogvseviesrjvmsoeinvsioevlbnersbnrviusenrvusdnviusrdvnrnirdlintv745684375645873694648395673495689748346975436385764476543085734673757347853759375903793075930576395768390576493085769375639756937";

function checkPass() {
    const val = document.getElementById('pass-input').value;
    if (val === CORRECT_PASS) {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-ui').style.display = 'flex';
        document.body.style.overflow = 'auto';
        initDashboard(); 
    } else {
        document.getElementById('fail-msg').style.display = 'block';
        document.getElementById('pass-input').value = "";
    }
}

// Enter key support
document.getElementById('pass-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') checkPass();
});

async function initDashboard() {
    const PENDING_FILE = "apppending.xml";
    const FINAL_FILE = "apps.xml";
    const token = window.GITHUB_TOKEN || (typeof GITHUB_TOKEN !== 'undefined' ? GITHUB_TOKEN : null);
    const owner = window.GITHUB_OWNER || (typeof GITHUB_OWNER !== 'undefined' ? GITHUB_OWNER : null);
    const repo = window.GITHUB_REPO || (typeof GITHUB_REPO !== 'undefined' ? GITHUB_REPO : null);
    
    const listContainer = document.getElementById('app-list');
    const status = document.getElementById('status');

    if (!token || !owner || !repo) {
        status.innerHTML = `<span style="color:red">Missing Config!</span>`;
        return;
    }

    async function getFile(path) {
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
        try {
            const res = await fetch(url, { headers: { "Authorization": `token ${token}` } });
            if (!res.ok) return null;
            const data = await res.json();
            return {
                sha: data.sha,
                content: decodeURIComponent(escape(atob(data.content)))
            };
        } catch (e) { return null; }
    }

    // Logic to save changes to GitHub
    async function updateFiles(pendingContent, pendingSha, finalContent = null, finalSha = null) {
        status.innerText = "Saving...";
        // Update Pending
        await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${PENDING_FILE}`, {
            method: "PUT",
            headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
            body: JSON.stringify({
                message: "Admin: Processed review queue",
                content: btoa(unescape(encodeURIComponent(pendingContent))),
                sha: pendingSha
            })
        });

        // Update Final if approved
        if (finalContent && finalSha) {
            await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${FINAL_FILE}`, {
                method: "PUT",
                headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: "Admin: Approved app",
                    content: btoa(unescape(encodeURIComponent(finalContent))),
                    sha: finalSha
                })
            });
        }
        location.reload();
    }

    const pendingData = await getFile(PENDING_FILE);
    if (!pendingData) { status.innerText = "Queue empty or file error."; return; }

    const parser = new DOMParser();
    const xmlDoc = parser.parseFromString(pendingData.content, "text/xml");
    const apps = xmlDoc.getElementsByTagName("app");

    if (apps.length === 0) status.innerText = "No pending apps.";

    // Render with OLD LAYOUT
    Array.from(apps).forEach(app => {
        const id = app.getAttribute("id");
        const name = app.getElementsByTagName("name")[0].textContent;
        const card = document.createElement('div');
        card.className = 'app-card';
        card.innerHTML = `
            <div class="app-info">
                <h2>${name}</h2>
                <div class="controls">
                    <button class="btn-approve" onclick="processApp('${id}', true)">Approve</button>
                    <button class="btn-decline" onclick="processApp('${id}', false)">Decline</button>
                </div>
            </div>`;
        listContainer.appendChild(card);
    });

    // Function to handle button clicks
    window.processApp = async function(appId, isApproved) {
        const appRegex = new RegExp(`<app id="${appId}">[\\s\\S]*?<\\/app>`, 'g');
        const appMatches = pendingData.content.match(appRegex);
        
        if (!appMatches) return;
        
        const appXml = appMatches[0];
        const newPendingContent = pendingData.content.replace(appRegex, "").replace(/\n\s*\n/g, '\n');

        if (isApproved) {
            const finalData = await getFile(FINAL_FILE);
            if (!finalData) return;
            const newFinalContent = finalData.content.replace('</apps>', `    ${appXml}\n</apps>`);
            await updateFiles(newPendingContent, pendingData.sha, newFinalContent, finalData.sha);
        } else {
            if(confirm("Reject this app?")) {
                await updateFiles(newPendingContent, pendingData.sha);
            }
        }
    };
}
</script>
</body>
</html>

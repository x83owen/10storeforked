<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>10-Store | Admin Panel</title>
    <style>
        :root {
            --win-blue: #0078D7;
            --win-green: #107C10;
            --win-red: #E81123;
            --win-bg: #F2F2F2;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--win-bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Login Overlay */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .login-box { text-align: center; width: 300px; }
        .user-avatar {
            width: 120px; height: 120px;
            background: #888; border-radius: 50%;
            margin: 0 auto 20px; display: flex;
            align-items: center; justify-content: center;
            font-size: 50px;
        }

        .login-box input {
            width: 100%; padding: 8px;
            border: 2px solid rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.2);
            color: white; box-sizing: border-box;
            outline: none; margin-bottom: 10px;
        }

        .login-box button {
            background: rgba(255,255,255,0.2);
            border: 2px solid white; color: white;
            width: 100%; padding: 8px; cursor: pointer;
        }

        /* XML Editor Modal */
        #edit-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .modal-box {
            background: white; width: 80%; max-width: 700px;
            padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .modal-box textarea {
            width: 100%; height: 300px; font-family: 'Consolas', monospace;
            font-size: 13px; margin: 15px 0; padding: 10px; box-sizing: border-box;
            border: 1px solid #ccc;
        }

        header { background: var(--win-blue); color: white; padding: 10px 25px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10; }
        header h1 { margin: 0; font-size: 18px; font-weight: 400; }

        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 260px; background: #E6E6E6; padding: 20px; border-right: 1px solid #CCC; overflow-y: auto; }
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        .dashboard-container { max-width: 900px; margin: 0 auto; }

        .section-title { font-size: 20px; font-weight: 300; margin: 30px 0 15px; border-bottom: 1px solid #ccc; padding-bottom: 5px; color: #333; }

        /* Uploader Form */
        .upload-form input, .upload-form textarea { width: 100%; padding: 5px; margin-bottom: 8px; border: 1px solid #ccc; font-size: 12px; box-sizing: border-box; }
        .upload-form textarea { resize: none; } /* Disabled Resizing */
        .upload-form h4 { margin: 10px 0 5px; font-size: 13px; color: var(--win-blue); }

        .app-card { background: white; border: 1px solid #DDD; padding: 20px; margin-bottom: 25px; display: flex; gap: 25px; position: relative; }
        .app-icon { width: 100px; height: 100px; object-fit: contain; background: #F0F0F0; border: 1px solid #EEE; }
        .app-info { flex-grow: 1; }
        .app-info h2 { margin: 0 0 5px 0; color: #333; font-weight: 300; font-size: 22px; }
        .pub-text { color: #666; font-size: 13px; margin-bottom: 10px; }

        .controls { margin-top: 15px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        button { padding: 6px 20px; border: none; cursor: pointer; font-size: 13px; }
        .btn-approve { background: var(--win-green); color: white; }
        .btn-decline { background: #CCC; color: black; }
        .btn-unpublish { background: #444; color: white; }
        .btn-edit { background: var(--win-blue); color: white; }

        .stats-box { background: white; border: 1px solid #CCC; padding: 15px; margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <div class="user-avatar">👤</div>
        <h2 style="font-weight:300;">10Store Admin</h2>
        <input type="password" id="pass-input" placeholder="Password" autofocus>
        <button onclick="checkPass()">Log on</button>
        <p id="fail-msg" style="color:#ffb3b3; display:none; margin-top:10px;">Error</p>
    </div>
</div>

<div id="edit-modal">
    <div class="modal-box">
        <h3 style="margin-top:0;">Edit App XML</h3>
        <textarea id="xml-edit-area"></textarea>
        <div style="text-align:right;">
            <button onclick="closeEdit()">Cancel</button>
            <button class="btn-approve" onclick="saveXmlEdit()">Save Changes</button>
        </div>
    </div>
</div>

<header><h1>10Store Admin Panel</h1></header>

<div class="main-layout">
    <div class="sidebar">
        <h3>Dashboard</h3>
        <div id="status" style="font-size:13px; color:#666; margin-bottom: 10px;">Waiting</div>
        <hr>
        
        <div class="upload-form">
            <h4 style="margin-top:0;">Quick Upload</h4>
            <input type="text" id="up-name" placeholder="App Name">
            <input type="text" id="up-pub" placeholder="Publisher">
            <input type="text" id="up-ver" placeholder="Version">
            <input type="text" id="up-icon" placeholder="Icon URL">
            <input type="text" id="up-pkg" placeholder="Package URL">
            <textarea id="up-desc" placeholder="Description" style="height:60px;"></textarea>
            <label style="font-size:11px;"><input type="checkbox" id="up-feat"> Featured</label>
            <button class="btn-approve" style="width:100%; margin-top:5px;" onclick="directUpload()">Publish Now</button>
        </div>

        <div class="stats-box">
            Live Apps: <strong id="live-count">...</strong>
        </div>
    </div>

    <div class="content">
        <div class="dashboard-container">
            <h2 class="section-title">Pending</h2>
            <div id="app-list"></div>
            
            <h2 class="section-title">Published</h2>
            <div id="live-list"></div>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script src="pasw.js"></script>
<script>
let currentEditingId = null;
let cachedFinalData = null;
let cachedPendingData = null;

function checkPass() {
    const val = document.getElementById('pass-input').value;
    if (val === PASSW) {
        document.getElementById('login-overlay').style.display = 'none';
        setTimeout(initDashboard, 100);
    } else {
        document.getElementById('fail-msg').style.display = 'block';
    }
}

async function initDashboard() {
    const token = window.GITHUB_TOKEN || GITHUB_TOKEN;
    const owner = window.GITHUB_OWNER || GITHUB_OWNER;
    const repo = window.GITHUB_REPO || GITHUB_REPO;
    document.getElementById('status').innerText = "Connected";

    const listContainer = document.getElementById('app-list');
    const liveContainer = document.getElementById('live-list');
    const status = document.getElementById('status');
    const liveCountEl = document.getElementById('live-count');

    if (!token || !owner || !repo) {
        status.innerHTML = `<b style="color:red">Config Error!</b>`;
        return;
    }

    const PENDING_FILE = "apppending.xml";
    const FINAL_FILE = "apps.xml";

    async function getFile(path) {
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
        try {
            const res = await fetch(url, { headers: { "Authorization": `token ${token}` } });
            if (!res.ok) return null;
            const data = await res.json();
            return { sha: data.sha, content: decodeURIComponent(escape(atob(data.content))) };
        } catch (e) { return null; }
    }

    cachedFinalData = await getFile(FINAL_FILE);
    cachedPendingData = await getFile(PENDING_FILE);

    function render(xmlContent, container, isLive) {
        container.innerHTML = "";
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlContent, "text/xml");
        const apps = xmlDoc.getElementsByTagName("app");
        if(apps.length === 0) { container.innerHTML = "<p>Empty.</p>"; return; }

        Array.from(apps).forEach(app => {
            const id = app.getAttribute("id");
            const name = app.getElementsByTagName("name")[0].textContent;
            const icon = app.getElementsByTagName("icon")[0].textContent;
            
            const card = document.createElement('div');
            card.className = 'app-card';
            card.innerHTML = `
                <img src="${icon}" class="app-icon" onerror="this.src='https://via.placeholder.com/100'">
                <div class="app-info">
                    <h2>${name}</h2>
                    <div class="pub-text">ID: ${id}</div>
                    <div class="controls">
                        ${isLive ? 
                            `<button class="btn-edit" onclick="openEdit('${id}')">Edit XML</button>
                             <button class="btn-unpublish" onclick="removeLive('${id}')">Unpublish</button>` :
                            `<input type="checkbox" id="feat-${id}"> Featured
                             <button class="btn-decline" onclick="processApp('${id}', false)">Decline</button>
                             <button class="btn-approve" onclick="processApp('${id}', true)">Approve</button>`
                        }
                    </div>
                </div>`;
            container.appendChild(card);
        });
        if(isLive) liveCountEl.innerText = apps.length;
    }

    if(cachedPendingData) render(cachedPendingData.content, listContainer, false);
    if(cachedFinalData) render(cachedFinalData.content, liveContainer, true);

    // Direct Upload Action
    window.directUpload = async function() {
        const name = document.getElementById('up-name').value;
        // Generate ID from Name: Lowercase, replace spaces/special chars with hyphens
        const id = name.toLowerCase()
                       .replace(/[^a-z0-9]/g, '-')
                       .replace(/-+/g, '-')
                       .replace(/^-|-$/g, '');

        const pub = document.getElementById('up-pub').value;
        const ver = document.getElementById('up-ver').value;
        const icon = document.getElementById('up-icon').value;
        const pkg = document.getElementById('up-pkg').value;
        const desc = document.getElementById('up-desc').value;
        const feat = document.getElementById('up-feat').checked;

        if(!name || !pkg) return alert("Fill Name and Package URL!");

        const appXml = `
    <app id="${id}">
        <name>${name}</name>
        <icon>${icon}</icon>
        <version>${ver}</version>
        <publisher>${pub}</publisher>
        <description>${desc}</description>
        <package>${pkg}</package>
        <featured>${feat}</featured>
    </app>`;

        status.innerText = "Uploading...";
        const newFinal = cachedFinalData.content.replace('</apps>', `${appXml}\n</apps>`);
        await commit(null, null, newFinal, cachedFinalData.sha);
    }

    // Modal Actions
    window.openEdit = function(appId) {
        currentEditingId = appId;
        const appRegex = new RegExp(`<app id="${appId}">[\\s\\S]*?<\\/app>`);
        const match = cachedFinalData.content.match(appRegex);
        if (match) {
            document.getElementById('xml-edit-area').value = match[0].trim();
            document.getElementById('edit-modal').style.display = 'flex';
        }
    };

    window.closeEdit = () => document.getElementById('edit-modal').style.display = 'none';

    window.saveXmlEdit = async function() {
        const newXml = document.getElementById('xml-edit-area').value;
        const appRegex = new RegExp(`<app id="${currentEditingId}">[\\s\\S]*?<\\/app>`);
        const newFinal = cachedFinalData.content.replace(appRegex, newXml);
        status.innerText = "Saving...";
        await commit(null, null, newFinal, cachedFinalData.sha);
    };

    window.processApp = async function(appId, isApproved) {
        status.innerText = "Processing...";
        const appRegex = new RegExp(`<app id="${appId}">[\\s\\S]*?<\\/app>`, 'g');
        const match = cachedPendingData.content.match(appRegex);
        if (!match) return;

        let appXml = match[0];
        const isFeatured = document.getElementById(`feat-${appId}`)?.checked;
        appXml = appXml.replace(/<featured>.*?<\/featured>/, `<featured>${isFeatured}</featured>`);

        const newPending = cachedPendingData.content.replace(appRegex, "").replace(/\n\s*\n/g, '\n');
        let newFinal = isApproved ? cachedFinalData.content.replace('</apps>', `    ${appXml}\n</apps>`) : null;
        await commit(newPending, cachedPendingData.sha, newFinal, cachedFinalData.sha);
    };

    window.removeLive = async function(appId) {
        if(!confirm("Remove app?")) return;
        status.innerText = "Removing...";
        const appRegex = new RegExp(`<app id="${appId}">[\\s\\S]*?<\\/app>`, 'g');
        const newFinal = cachedFinalData.content.replace(appRegex, "").replace(/\n\s*\n/g, '\n');
        await commit(null, null, newFinal, cachedFinalData.sha);
    };

    async function commit(pContent, pSha, fContent, fSha) {
        const headers = { "Authorization": `token ${token}`, "Content-Type": "application/json" };
        if (pContent !== null) {
            await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${PENDING_FILE}`, {
                method: "PUT", headers,
                body: JSON.stringify({ message: "Update Pending", content: btoa(unescape(encodeURIComponent(pContent))), sha: pSha })
            });
        }
        if (fContent !== null) {
            await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${FINAL_FILE}`, {
                method: "PUT", headers,
                body: JSON.stringify({ message: "Update Live", content: btoa(unescape(encodeURIComponent(fContent))), sha: fSha })
            });
        }
        location.reload();
    }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>10-Store | Admin Review</title>
    <style>
        :root {
            --win-blue: #0078D7;
            --win-green: #107C10;
            --win-red: #E81123;
            --win-bg: #F2F2F2;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--win-bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Login Overlay */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .login-box { text-align: center; width: 300px; }
        .user-avatar {
            width: 120px; height: 120px;
            background: #888; border-radius: 50%;
            margin: 0 auto 20px; display: flex;
            align-items: center; justify-content: center;
            font-size: 50px;
        }

        .login-box input {
            width: 100%; padding: 8px;
            border: 2px solid rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.2);
            color: white; box-sizing: border-box;
            outline: none; margin-bottom: 10px;
        }

        .login-box button {
            background: rgba(255,255,255,0.2);
            border: 2px solid white; color: white;
            width: 100%; padding: 8px; cursor: pointer;
        }

        header { background: var(--win-blue); color: white; padding: 10px 25px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10; }
        header h1 { margin: 0; font-size: 18px; font-weight: 400; }

        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 250px; background: #E6E6E6; padding: 20px; border-right: 1px solid #CCC; }
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        .dashboard-container { max-width: 900px; margin: 0 auto; }

        .section-title { font-size: 20px; font-weight: 300; margin: 30px 0 15px; border-bottom: 1px solid #ccc; padding-bottom: 5px; color: #333; }

        .app-card { background: white; border: 1px solid #DDD; padding: 20px; margin-bottom: 25px; display: flex; gap: 25px; position: relative; }
        .app-icon { width: 100px; height: 100px; object-fit: contain; background: #F0F0F0; border: 1px solid #EEE; }
        .app-info { flex-grow: 1; }
        .app-info h2 { margin: 0 0 5px 0; color: #333; font-weight: 300; font-size: 22px; }
        .pub-text { color: #666; font-size: 13px; margin-bottom: 10px; }
        .asset-links { margin: 10px 0; padding: 8px 0; border-top: 1px solid #EEE; }
        .asset-links a { color: var(--win-blue); text-decoration: none; margin-right: 15px; font-size: 12px; font-weight: 600; }

        .controls { margin-top: 15px; display: flex; gap: 10px; align-items: center; }
        button { padding: 6px 20px; border: none; cursor: pointer; font-size: 13px; }
        .btn-approve { background: var(--win-green); color: white; }
        .btn-decline { background: #CCC; color: black; }
        .btn-unpublish { background: #444; color: white; }
        .btn-unpublish:hover { background: var(--win-red); }

        .stats-box { background: white; border: 1px solid #CCC; padding: 15px; margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <div class="user-avatar">👤</div>
        <h2 style="font-weight:300;">Administrator</h2>
        <input type="password" id="pass-input" placeholder="Password" autofocus>
        <button onclick="checkPass()">Sign in</button>
        <p id="fail-msg" style="color:#ffb3b3; display:none; margin-top:10px;">Incorrect password.</p>
    </div>
</div>

<header><h1>10-Store App Management</h1></header>

<div class="main-layout">
    <div class="sidebar">
        <h3>Dashboard</h3>
        <p style="font-size: 12px; color: #555;">Manage pending reviews and live store inventory.</p>
        <hr>
        <div id="status" style="font-size:13px; color:#666;">Waiting for login...</div>
        <div class="stats-box">
            Live Apps: <strong id="live-count">...</strong>
        </div>
    </div>

    <div class="content">
        <div class="dashboard-container">
            <h2 class="section-title">Pending Submissions</h2>
            <div id="app-list"></div>
            
            <h2 class="section-title">Live Inventory</h2>
            <div id="live-list"></div>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script>
const CORRECT_PASS = "f578dsf67hsdf578h967g86s6f5875g69s7f8h5sd5g8sd9f67gds678fb7sv6dct6gensr7tc6w5et6cwfy9wr58hy84578wr578t4fw45ht8o";

function checkPass() {
    const val = document.getElementById('pass-input').value;
    if (val === CORRECT_PASS) {
        document.getElementById('login-overlay').style.display = 'none';
        // Delay init slightly to ensure config.js variables are fully bound to window
        setTimeout(initDashboard, 100);
    } else {
        document.getElementById('fail-msg').style.display = 'block';
    }
}

async function initDashboard() {
    // FORCE CHECK: If config.js failed, try to grab them from global scope or window
    const token = window.GITHUB_TOKEN || GITHUB_TOKEN;
    const owner = window.GITHUB_OWNER || GITHUB_OWNER;
    const repo = window.GITHUB_REPO || GITHUB_REPO;

    const listContainer = document.getElementById('app-list');
    const liveContainer = document.getElementById('live-list');
    const status = document.getElementById('status');
    const liveCountEl = document.getElementById('live-count');

    // If still undefined, show a clear error instead of crashing the URL
    if (!token || !owner || !repo) {
        console.error("Config missing!", { token, owner, repo });
        status.innerHTML = `<b style="color:red">Config Error:</b> Variables are undefined. Check config.js`;
        return;
    }

    const PENDING_FILE = "apppending.xml";
    const FINAL_FILE = "apps.xml";

    async function getFile(path) {
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
        try {
            const res = await fetch(url, { 
                headers: { "Authorization": `token ${token}` } 
            });
            if (!res.ok) return null;
            const data = await res.json();
            return { sha: data.sha, content: decodeURIComponent(escape(atob(data.content))) };
        } catch (e) { return null; }
    }

    const finalData = await getFile(FINAL_FILE);
    const pendingData = await getFile(PENDING_FILE);

    // Render Logic
    function render(xmlContent, container, isLive) {
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlContent, "text/xml");
        const apps = xmlDoc.getElementsByTagName("app");
        if(apps.length === 0) { container.innerHTML = "<p>Empty.</p>"; return; }

        Array.from(apps).forEach(app => {
            const id = app.getAttribute("id");
            const name = app.getElementsByTagName("name")[0].textContent;
            const icon = app.getElementsByTagName("icon")[0].textContent;
            
            const card = document.createElement('div');
            card.className = 'app-card';
            card.innerHTML = `
                <img src="${icon}" class="app-icon" onerror="this.src='https://via.placeholder.com/100'">
                <div class="app-info">
                    <h2>${name}</h2>
                    <div class="pub-text">ID: ${id}</div>
                    <div class="controls">
                        ${isLive ? 
                            `<button class="btn-unpublish" onclick="removeLive('${id}')">Remove from Store</button>` :
                            `<input type="checkbox" id="feat-${id}"> Featured
                             <button class="btn-decline" onclick="processApp('${id}', false)">Decline</button>
                             <button class="btn-approve" onclick="processApp('${id}', true)">Approve</button>`
                        }
                    </div>
                </div>`;
            container.appendChild(card);
        });
        if(isLive) liveCountEl.innerText = apps.length;
    }

    if(pendingData) render(pendingData.content, listContainer, false);
    if(finalData) render(finalData.content, liveContainer, true);

    // Approve/Decline Logic
    window.processApp = async function(appId, isApproved) {
        status.innerText = "Syncing...";
        const appRegex = new RegExp(`<app id="${appId}">[\\s\\S]*?<\\/app>`, 'g');
        const match = pendingData.content.match(appRegex);
        if (!match) return;

        let appXml = match[0];
        const isFeatured = document.getElementById(`feat-${appId}`)?.checked;
        appXml = appXml.replace(/<featured>.*?<\/featured>/, `<featured>${isFeatured}</featured>`);

        const newPending = pendingData.content.replace(appRegex, "").replace(/\n\s*\n/g, '\n');
        let newFinal = null;

        if (isApproved) {
            const existingRegex = new RegExp(`<app id="${appId}">[\\s\\S]*?<\\/app>`);
            newFinal = finalData.content.replace(existingRegex, "").replace('</apps>', `    ${appXml}\n</apps>`);
        }

        await commit(newPending, pendingData.sha, newFinal, finalData.sha);
    };

    // Unpublish Logic
    window.removeLive = async function(appId) {
        if(!confirm("Remove app?")) return;
        status.innerText = "Removing...";
        const appRegex = new RegExp(`<app id="${appId}">[\\s\\S]*?<\\/app>`, 'g');
        const newFinal = finalData.content.replace(appRegex, "").replace(/\n\s*\n/g, '\n');
        await commit(null, null, newFinal, finalData.sha);
    };

    async function commit(pContent, pSha, fContent, fSha) {
        const headers = { "Authorization": `token ${token}`, "Content-Type": "application/json" };
        if (pContent !== null) {
            await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${PENDING_FILE}`, {
                method: "PUT", headers,
                body: JSON.stringify({ message: "Admin: Update Pending", content: btoa(unescape(encodeURIComponent(pContent))), sha: pSha })
            });
        }
        if (fContent !== null) {
            await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${FINAL_FILE}`, {
                method: "PUT", headers,
                body: JSON.stringify({ message: "Admin: Update Live", content: btoa(unescape(encodeURIComponent(fContent))), sha: fSha })
            });
        }
        location.reload();
    }
}
</script>
</body>
</html>
